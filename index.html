    display: flex; align-items: center; justify-content: center;
  }
  .drone-bt-wrap svg { width: 96px; height: 96px; fill: var(--drone-bt); }
  .drone-bt-ring {
    position: absolute; inset: 0;
    border: 2px solid var(--drone-bt);
    border-radius: 50%;
    /* starts ~15% wider than the icon and breathes outward */
    animation: drone-ring 2.6s ease-out infinite;
  }
  @keyframes drone-ring {
    0%   { transform: scale(0.85); opacity: 0.8; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  .drone-status {
    font-size: var(--drone-font-status);
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--drone-ink-soft);
    margin-top: 14px;
    /* slow breathe, same feel as the no-signal subtitle */
    animation: drone-flash 3s ease-in-out infinite;
  }
  @keyframes drone-flash {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.15; }
  }

  /* Attitude dial — right edge, LIVE (gyro-driven), full opacity */
  .drone-dial {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    width: 90px; height: 240px;
    color: var(--drone-ink);
  }
  .drone-dial svg { width: 100%; height: 100%; overflow: visible; }
  .drone-dial-num {
    position: absolute;
    right: 64px; top: 50%;
    transform: translateY(-50%);
    font-size: calc(20px * var(--font-scale));
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 52px;
  }

  /* ============================================================
     NO SIGNAL
  ============================================================ */
  /* ── No Signal — module card ────────────────────────────────
     Deliberately in the Phone app's visual family: same backdrop,
     ink hierarchy and type scale as an active call screen. */
  #screen-nosignal {
    --nosig-bg:         #0d0d12;                 /* call-screen backdrop */
    --nosig-ink:        rgba(255,255,255,0.6);   /* dimmed — a dead system shouldn't glow */
    --nosig-ink-soft:   rgba(255,255,255,0.45);
    --nosig-ink-faint:  rgba(255,255,255,0.3);
    --nosig-badge:      var(--negative);         /* the red X dot */
    --nosig-font-title: calc(34px * var(--font-scale));
    --nosig-font-sub:   calc(16px * var(--font-scale));

    --nosig-top:        19vh;                    /* cluster sits in the top third (height-relative) */

    background: var(--nosig-bg);
    z-index: 8;
    color: var(--nosig-ink);
    align-items: center;
    justify-content: flex-start;
    gap: 26px;
    text-align: center;
    padding: var(--nosig-top) 32px 0;
  }
  .nosig-icon { width: 116px; height: 116px; }
  .nosig-icon .nosig-bar {
    fill: none;
    stroke: var(--nosig-ink);
    stroke-width: 3;
  }
  .nosig-icon .nosig-badge { fill: var(--nosig-badge); stroke: var(--nosig-bg); stroke-width: 5; }
  .nosig-icon .nosig-x { stroke: #fff; stroke-width: 7; stroke-linecap: round; }
  .nosig-title {
    font-size: var(--nosig-font-title);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--nosig-ink);
  }
  .nosig-sub {
    font-size: var(--nosig-font-sub);
    font-weight: 500;
    color: var(--nosig-ink-soft);
    margin-top: -14px;
    animation: nosig-pulse 3s ease-in-out infinite;
  }
  @keyframes nosig-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  #phone-chrome[data-screen="screen-nosignal"] { --sb-bg: #0d0d12; }

  /* ── No Signal — LIGHT sheet ────────────────────────────────
     Follows the Phone app's theme (themeCalls / Settings force),
     since this screen is the phone system's dead state. */
  .call-light #screen-nosignal {
    --nosig-bg:        #f2f2f7;
    --nosig-ink:       rgba(0,0,0,0.65);
    --nosig-ink-soft:  rgba(0,0,0,0.5);
    --nosig-ink-faint: rgba(0,0,0,0.35);
  }
  #phone-chrome.call-light[data-screen="screen-nosignal"] {
    --sb-bg: #f2f2f7; --sb-ink: #000; --sb-icon-filter: none;
  }

  /* ============================================================
     IMAGE VIEWER
  ============================================================ */
  /* ── Image viewer — module card ─────────────────────────────
     Full-screen photo over black, bars top and bottom. Opened by
     tapping an image in Messages, or directly via sceneType
     "imgview" for insert shots. */
  #screen-imgview {
    --imgv-bg:     #000;
    --imgv-bar-bg: #000;
    --imgv-ink:    #fff;
    --imgv-icon:   calc(24px * var(--font-scale));

    background: var(--imgv-bg);
    z-index: 8;
    color: var(--imgv-ink);
  }
  .imgv-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    background: var(--imgv-bar-bg);
  }
  .imgv-top { justify-content: space-between; padding: 8px 10px; }
  .imgv-top-right { display: flex; gap: 4px; }
  .imgv-btn {
    background: none; border: none;
    color: var(--imgv-ink);
    width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;

<script>
/* ============================================================
   STATE
============================================================ */
let allChars  = [];
let allScenes = [];
let charData  = null;
let sceneData = null;
let currentCfg = null;
let callTimer = null;
let callSeconds = 0;

/* ── Scene timer registry ─────────────────────────────────────
   Every timeout/interval created for a scene goes through these
   helpers so a scene change / reset can never leave a stray timer
   ticking against a dead screen. */
let _sceneTimers = [];
function sceneTimeout(fn, ms) {
  const id = setTimeout(fn, ms);
  _sceneTimers.push({ interval: false, id });
  return id;
}
function sceneInterval(fn, ms) {
  const id = setInterval(fn, ms);
  _sceneTimers.push({ interval: true, id });
  return id;
}
function clearSceneTimers() {
  _sceneTimers.forEach(t => t.interval ? clearInterval(t.id) : clearTimeout(t.id));
  _sceneTimers = [];
  callTimer = null;
}


/* ── Module registry + lifecycle ─────────────────────────────
   Each app is one entry in MODULES: { defaults, build(cfg, ctx),
   destroy() }. loadModule() strikes the previous module completely
   (its listeners, all scene timers, its destroy hook) before
   building the next — no module ever cleans up after another.
   The ctx passed to build() is the ONLY way a module should add
   listeners (ctx.listen) — they're logged and auto-removed at
   teardown, which is what makes leaks structurally impossible.
   Screens not yet converted (map/tracker/drone/wallet/noservice/
   vfx/idle) still run on the legacy path in launchScene. */
const MODULES = {};
let _activeModule = null;

function makeModuleCtx() {
  const listeners = [];
  return {
    listen(el, ev, fn, opts) {
      el.addEventListener(ev, fn, opts);
      listeners.push([el, ev, fn, opts]);
    },
    setTimeout: sceneTimeout,
    setInterval: sceneInterval,
    _teardown() {
      listeners.forEach(([el, ev, fn, opts]) => el.removeEventListener(ev, fn, opts));
      listeners.length = 0;
    }
  };
}

/* Instant-hide + wipe for module screens. Without this, the emptied
   screen stays visible through the 0.35s crossfade and its bare
   background flashes (white on light modules like contacts). */
function wipeScreen(id) {
  const el = document.getElementById(id);
  el.style.transition = 'none';
  el.classList.add('hidden');
  el.innerHTML = '';
  requestAnimationFrame(() => { el.style.transition = ''; });
}

function teardownActiveModule() {
  clearSceneTimers();
  if (!_activeModule) return;
  try { if (_activeModule.destroy) _activeModule.destroy(); } catch (e) { console.warn('module destroy failed:', e); }
  _activeModule.ctx._teardown();
  _activeModule = null;
}

function loadModule(name, cfg) {
  teardownActiveModule();
  const mod = MODULES[name];
  const merged = Object.assign({}, mod.defaults || {}, cfg);
  const ctx = makeModuleCtx();
  _activeModule = { name, ctx, destroy: mod.destroy || null };
  mod.build(merged, ctx);
}

/* ============================================================
   SETUP SCREEN
============================================================ */
const LS_CHAR = 'phoneOS_char';
const LS_EP   = 'phoneOS_ep';

const selChar    = document.getElementById('sel-char');
const selScene   = document.getElementById('sel-scene');
const sceneHint  = document.getElementById('scene-hint');
const setupStatus  = document.getElementById('setup-status');
const setupStatus2 = document.getElementById('setup-status2');
const btnNext    = document.getElementById('btn-next');
const btnLaunch  = document.getElementById('btn-launch');
const btnBack    = document.getElementById('btn-back');
const selEp      = document.getElementById('sel-ep');

function epFromSceneId(id) {
  const m = id.match(/^s(\d+)_/);
  return m ? m[1] : null;
}

function allEps() {
  return [...new Set(allScenes.map(s => epFromSceneId(s.id)).filter(Boolean))].sort();
}

function charsForEp(ep) {
  const ids = new Set(allScenes.filter(s => epFromSceneId(s.id) === ep).map(s => s.charId).filter(Boolean));
  // Always include global characters (e.g. VFX) regardless of episode
  const globals = allChars.filter(c => c.globalEp);
  globals.forEach(c => ids.add(c.id));
  return allChars.filter(c => ids.has(c.id));
}

function scenesForCharEp(charId, ep) {
  const isGlobal = allChars.some(c => c.id === charId && c.globalEp);
  return allScenes.filter(s => {
    const charOk = !s.charId || s.charId === charId;
    const epOk   = isGlobal || !ep || epFromSceneId(s.id) === ep;
    return charOk && epOk;
  });
}

async function initSetup() {
  setStatus('Loading…', false);
  try {
    const res = await fetch('manifest-index.json');
    if (!res.ok) throw new Error('manifest-index.json not found');
    const index = await res.json();
    allChars  = index.characters || [];
    allScenes = index.scenes     || [];
    populateEpSelect();
    setStatus('', false);

    const savedChar = localStorage.getItem(LS_CHAR);
    const savedEp   = localStorage.getItem(LS_EP);
    if (savedChar && savedEp && allChars.some(c => c.id === savedChar)) {
      showStage2(savedChar, savedEp);
    }
  } catch(e) {
    setStatus('⚠️ ' + e.message + ' — run build-index.py first', true);
  }
}

function populateEpSelect() {
  const eps = allEps();
  selEp.innerHTML = '<option value="">Select episode…</option>';
  eps.forEach(ep => {
    const opt = document.createElement('option');
    opt.value = ep;
    opt.textContent = ep;
    selEp.appendChild(opt);
  });
  selChar.innerHTML = '<option value="">— select episode first —</option>';
  checkStage1Ready();
}

function populateCharSelectForEp(ep) {
  const chars = charsForEp(ep);
  selChar.innerHTML = chars.length
    ? '<option value="">Select character…</option>'
    : '<option value="">No characters found</option>';
  chars.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.label;
    selChar.appendChild(opt);
    if (chars.length === 1) opt.selected = true;
  });
  checkStage1Ready();
}

function sceneNum(id) {
  // s207_58 → 207*1000000 + 58*100; s208_33a → 208*1000000 + 33*100 + 1
  // Word suffixes are ignored for ordering: s207_14_txt sorts as scene 14,
  // s208_99_manny sorts as scene 99 (ties broken alphabetically by the sort below).
  const m = id.match(/^s(\d+)_(\d+)([a-z]?)(?:_|$)/);
  if (!m) return 999999999; // non-episode IDs (vfx, dev) sort last
  const ep  = parseInt(m[1], 10);
  const sc  = parseInt(m[2], 10);
  const sfx = m[3] ? m[3].charCodeAt(0) - 96 : 0;
  return ep * 1000000 + sc * 100 + sfx;
}

function populateSceneSelect(charId, ep) {
  const scenes = scenesForCharEp(charId, ep).slice().sort((a, b) => sceneNum(a.id) - sceneNum(b.id));
  selScene.innerHTML = '<option value="">Select scene…</option>';
  scenes.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.label.replace(/^\d+\s+/, '');
    selScene.appendChild(opt);
  });
  // Dial Pad always available for every character
  if (scenes.length) {
    const sep = document.createElement('option');
    sep.disabled = true;
    sep.textContent = '─────────────';
    selScene.appendChild(sep);
  }
  const dialOpt = document.createElement('option');
  dialOpt.value = '__dialer__';
  dialOpt.textContent = 'Dial Pad';
  selScene.appendChild(dialOpt);
  btnLaunch.disabled = true;
  sceneHint.textContent = '';
}

selEp.addEventListener('change', () => {
  populateCharSelectForEp(selEp.value);
});

selChar.addEventListener('change', checkStage1Ready);
selScene.addEventListener('change', () => {
  btnLaunch.disabled = !selScene.value;
  // Show the backing JSON filename so the operator can confirm which file loads
  sceneHint.textContent = (selScene.value && selScene.value !== '__dialer__')
    ? 'scenes/' + selScene.value + '.json'
    : '';
});

function checkStage1Ready() {
  btnNext.disabled = !(selEp.value && selChar.value);
}

function setStatus(msg, isError) {
  setupStatus.textContent = msg;
  setupStatus.className = 'setup-status' + (isError ? ' error' : '');
}

function setStatus2(msg, isError) {
  setupStatus2.textContent = msg;
  setupStatus2.className = 'setup-status' + (isError ? ' error' : '');
}

function showStage1() {
  document.getElementById('setup-stage1').classList.remove('hidden');
  document.getElementById('setup-stage2').classList.add('hidden');
  document.getElementById('setup-settings').classList.add('hidden');
}

function showStage2(charId, ep) {
  const charLabel = (allChars.find(c => c.id === charId) || {}).label || charId;
  document.getElementById('setup-s2-label').textContent = 'Ep ' + ep + ' · ' + charLabel;
  populateSceneSelect(charId, ep);
  document.getElementById('setup-stage1').classList.add('hidden');
  document.getElementById('setup-stage2').classList.remove('hidden');
  document.getElementById('setup-settings').classList.add('hidden');
  setStatus2('', false);
}

btnNext.addEventListener('click', () => {
  const ep     = selEp.value;
  const charId = selChar.value;
  if (!ep || !charId) return;
  localStorage.setItem(LS_CHAR, charId);
  localStorage.setItem(LS_EP, ep);
  showStage2(charId, ep);
});

btnBack.addEventListener('click', () => {
  showStage1();
});

btnLaunch.addEventListener('click', () => { ensureFullscreen(); loadScene(); });

async function loadScene() {
  const charId  = localStorage.getItem(LS_CHAR);
  const sceneId = selScene.value;
  if (!charId || !sceneId) return;

  btnLaunch.disabled = true;
  setStatus('Loading…', false);

  try {
    if (sceneId === '__dialer__') {
      const cRes = await fetch(`chars/${charId}.json`);
      if (!cRes.ok) throw new Error(`chars/${charId}.json not found`);
      charData  = await cRes.json();
      sceneData = { sceneType: 'dialer' };
      launchPhone(Object.assign({}, charData, sceneData));
      return;
    }

    const [cRes, sRes] = await Promise.all([
      fetch(`chars/${charId}.json`),
      fetch(`scenes/${sceneId}.json`)
    ]);
    if (!cRes.ok) throw new Error(`chars/${charId}.json not found`);
    if (!sRes.ok) throw new Error(`scenes/${sceneId}.json not found`);

    charData  = await cRes.json();
    sceneData = await sRes.json();

    // Merge: scene values override char values
    const cfg = Object.assign({}, charData, sceneData);

    launchPhone(cfg);

  } catch(e) {
    setStatus('⚠️ ' + e.message, true);
    btnLaunch.disabled = false;
  }
}

/* ============================================================
   PHONE LAUNCH
============================================================ */
function launchPhone(cfg) {
  currentCfg = cfg;
  acquireWakeLock();
  applyWallpaper(cfg);
  applyStatusBar(cfg);

  // Show phone chrome
  document.getElementById('screen-setup').classList.add('hidden');
  document.getElementById('phone-chrome').classList.remove('hidden');

  if (cfg.startLocked) {
    loadModule('lock', cfg);
  } else {
    launchScene(cfg);
  }
}

/* ============================================================
   THEME
============================================================ */
/* Operator-chrome theme (setup screen). Driven solely by the Settings
   toggle — the legacy per-scene "theme" key was retired 2026-07-18. */
function reapplyTheme() {
  document.body.classList.remove('theme-dark');
  document.body.classList.toggle('theme-light', _settings.themeMode === 'light');
}

/* ============================================================
   WALLPAPER
============================================================ */
function applyWallpaper(cfg) {
  const src = cfg.wallpaperLock || cfg.wallpaperHome || null;
  setWallpaper(src, cfg);
}

function setWallpaper(src, cfg) {
  const el = document.getElementById('wallpaper');
  // Always set these explicitly — never use background shorthand (it resets background-size)
  if (src) {
    el.style.backgroundImage = `url('img/${src}')`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
    el.style.backgroundColor = '#0d0d12'; // fallback if image missing
  } else {
    el.style.backgroundImage = cfg.accentColor
      ? `linear-gradient(160deg, ${cfg.accentColor}44, #111)`
      : 'none';
    el.style.backgroundSize = '';
    el.style.backgroundPosition = '';
    el.style.backgroundColor = cfg.accentColor ? '' : '#111';
  }
}

/* ============================================================
   STATUS BAR
============================================================ */
function applyStatusBar(cfg) {
  // Clock — hidden by default, shown only if showClock is true
  const clockEl = document.getElementById('status-time');
  if (cfg.showClock) {
    clockEl.textContent = formatClock(cfg.clockTime, cfg.clockFormat);
    clockEl.style.display = '';
  } else {
    clockEl.style.display = 'none';
  }

  // Location arrow — filled inline SVG so weight is controllable without editing the asset
  document.getElementById('status-location').innerHTML = `<svg viewBox="0 0 46.21 49.27" style="height:var(--sb-arrow-h);width:auto;display:block;" fill="none" stroke="currentColor" stroke-linejoin="round"><polygon points="1.51 18.99 44.7 1.51 26.7 47.27 23.11 24.39 1.51 18.99" style="stroke-width:var(--sb-arrow-sw)"/></svg>`;

  if (cfg.airplaneMode) {
    document.getElementById('status-wifi').innerHTML   = '';
    document.getElementById('status-signal').innerHTML = svgAirplane();
    document.getElementById('status-5g').innerHTML     = '';
  } else {
    // Wifi — only show if wifi > 0
    const wifiLevel = cfg.wifi || 0;
    document.getElementById('status-wifi').innerHTML = wifiLevel > 0
      ? statusIcon(`img/icons/wifi-${Math.min(wifiLevel, 3)}.svg`)
      : '';

    // Signal bars — level 0 shows "No Signal" text, like a real phone
    const sigLevel = Math.max(0, Math.min(cfg.signal ?? 0, 4));
    document.getElementById('status-signal').innerHTML = sigLevel > 0
      ? statusIcon(`img/icons/signal-${sigLevel}.svg`)
      : '<span class="sb-nosig-text">No Signal</span>';

    // 5G indicator — hide when no signal
    document.getElementById('status-5g').innerHTML = sigLevel > 0 ? statusIcon('img/icons/5g.svg') : '';
  }

  // Battery — red for levels 0 and 1
  const batLevel = Math.max(0, Math.min(cfg.battery ?? 3, 5));
  const batCls = batLevel <= 1 ? 'battery-low' : '';
  document.getElementById('status-battery').innerHTML = statusIcon(`img/icons/battery-${batLevel}.svg`, 18, batCls);

  // Notifications — the status bar mirrors lock-screen notifications
  // automatically; manual cfg.notifications entries are kept, and an
  // auto icon is skipped when a manual equivalent is already present.
  const EQUIV = { txt: 'msgBubble', missCall: 'missedCall' };
  const manual = (cfg.notifications || []).slice();
  const shown = new Set(manual.map(k => EQUIV[k] || k));
  (cfg.lockNotifications || []).forEach(n => {
    const icon = n.icon || 'msgBubble';
    if (!shown.has(icon)) { shown.add(icon); manual.push(icon); }
  });
  const notifEl = document.getElementById('status-notifs');
  notifEl.innerHTML = '';
  manual.forEach(key => {
    const icon = notifIcon(key);
    if (icon) {
      const span = document.createElement('span');
      span.innerHTML = icon;
      notifEl.appendChild(span);
    }
  });
}

function formatClock(time, format) {
  if (!time) return '12:00';
  const m = String(time).trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?$/i);
  if (!m) return time; // unparseable — show as written in the JSON
  let h = parseInt(m[1], 10);
  const min = m[2];
  const ap  = m[3] ? m[3].toUpperCase() : null;
  if (format === '24h') {
    if (ap === 'PM' && h < 12) h += 12;
    if (ap === 'AM' && h === 12) h = 0;
    return `${String(h).padStart(2, '0')}:${min}`;
  }
  // 12h — convert from 24h input if needed, otherwise keep as written
  if (ap) return `${h}:${min} ${ap}`;
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${min} ${ampm}`;
}

/* ============================================================
   LOCK SCREEN — module
   Backdrop = character wallpaper (blurred + dimmed via the
   lock-active chrome class). Notifications may carry a sceneId —
   tapping one opens THAT scene via loadSceneById(), which is the
   standard hook for any module to open another module's content.
============================================================ */

/* Minimal HTML escape for JSON-sourced strings injected via innerHTML */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

/* ── Real flashlight (Android Chrome; needs one camera-permission
   grant per device). iOS has no web torch API — the button still
   toggles visually there. ── */
let _torchTrack = null;
async function setTorch(on) {
  try {
    if (!on) {
      if (_torchTrack) { _torchTrack.stop(); _torchTrack = null; }
      return true;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (!caps.torch) { track.stop(); return false; }
    await track.applyConstraints({ advanced: [{ torch: true }] });
    _torchTrack = track;
    return true;
  } catch (e) {
    console.warn('torch unavailable:', e.message);
    return false;
  }
}

MODULES.lock = {
  defaults: { lockType: 'swipe', lockNotifications: [] },

  build(cfg, ctx) {
    const chrome = document.getElementById('phone-chrome');
    chrome.classList.add('lock-active');
    const el = document.getElementById('screen-lock');

    // No explicit wallpaper? Use the character's call backdrop —
    // blurred + dimmed it reads as a personal lock screen.
    if (!cfg.wallpaperLock && !cfg.wallpaperHome && cfg.charId) {
      const wp = document.getElementById('wallpaper');
      wp.style.backgroundImage    = `url('img/bg/${cfg.charId}.png')`;
      wp.style.backgroundSize     = 'cover';
      wp.style.backgroundPosition = 'center';
    }

    // Card layout mirrors the production reference: lighter header band
    // (event label · "Press for More" · bold sender), divider, then the
    // message in large light type. The icon field is not drawn on the
    // card — it drives the status-bar mirror.
    const notifs = (cfg.lockNotifications || []).map((n, i) => `
      <button class="lock-notif" data-i="${i}" style="animation-delay:${(0.09 * i).toFixed(2)}s">
        <div class="lock-notif-head">
          <span class="lock-notif-app">${esc(n.app || 'New Message')}</span>
          ${n.title ? `<div class="lock-notif-title">${esc(n.title)}</div>` : ''}
        </div>
        ${n.text ? `<div class="lock-notif-body">${esc(n.text)}</div>` : ''}
      </button>`).join('');

    el.innerHTML = `
      <div class="lock-notifs">${notifs}</div>
      <div class="lock-bottom-bar">
        <button class="lock-chip" id="lock-flash" aria-label="Flashlight">${svgFlashlight()}</button>
        <button class="lock-chip" id="lock-cam" aria-label="Camera">${svgLockCamera()}</button>
      </div>`;

    // ── Unlock plumbing. A PIN lock interposes the pad before any
    //    unlock action; otherwise actions run immediately. ──
    let pinBuffer = '';
    let pendingAction = null;

    function runOrAskPin(action) {
      if (cfg.lockType === 'pin') { pendingAction = action; showPinPanel(); }
      else action();
    }

    function showPinPanel() {
      if (el.querySelector('.lock-pin-panel')) return;
      const panel = document.createElement('div');
      panel.className = 'lock-pin-panel';
      panel.innerHTML = buildPinPad();
      el.appendChild(panel);
      pinBuffer = '';
      panel.querySelectorAll('.pin-key').forEach(key => {
        ctx.listen(key, 'click', () => handlePinKey(key.dataset.val));
      });
    }

    function handlePinKey(val) {
      if (val === 'del') pinBuffer = pinBuffer.slice(0, -1);
      else if (pinBuffer.length < 4) pinBuffer += val;
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`pd-${i}`);
        if (dot) dot.classList.toggle('filled', i < pinBuffer.length);
      }
      if (pinBuffer.length === 4) {
        const correct = cfg.lockPin != null ? String(cfg.lockPin) : '0000';
        if (pinBuffer === correct) {
          const act = pendingAction || (() => unlockPhone(cfg));
          pendingAction = null;
          act();
        } else {
          const panel = el.querySelector('.lock-pin-panel');
          panel.classList.add('shake');
          sceneTimeout(() => {
            panel.classList.remove('shake');
            pinBuffer = '';
            for (let i = 0; i < 4; i++) {
              const dot = document.getElementById(`pd-${i}`);
              if (dot) dot.classList.remove('filled');
            }
          }, 450);
        }
      }
    }

    // ── Notification taps — the inter-module hook ──
    el.querySelectorAll('.lock-notif').forEach(card => {
      ctx.listen(card, 'click', () => {
        const n = (cfg.lockNotifications || [])[+card.dataset.i];
        runOrAskPin(() => {
          if (n && n.opens) {
            // Open a MODULE with this scene's own cfg (e.g. the
            // no-signal screen from a "Searching for connection" card)
            setWallpaper(cfg.wallpaperHome || cfg.wallpaperLock, cfg);
            hideScreen('screen-lock');
            const merged = Object.assign({}, cfg, { sceneType: n.opens });
            currentCfg = merged;   // restart re-locks (startLocked rides along)
            launchScene(merged);
          } else if (n && n.sceneId) {
            setWallpaper(cfg.wallpaperHome || cfg.wallpaperLock, cfg);
            hideScreen('screen-lock');
            loadSceneById(n.sceneId);
          } else {
            unlockPhone(cfg);
          }
        });
      });
    });

    // ── Swipe up to unlock (touch + mouse drag for the simulator) ──
    let startY = null;
    const begin = y => { startY = y; };
    const finish = y => {
      if (startY === null) return;
      const dy = startY - y;
      startY = null;
      if (dy > 50) runOrAskPin(() => unlockPhone(cfg));
    };
    ctx.listen(el, 'touchstart', e => begin(e.touches[0].clientY), { passive: true });
    ctx.listen(el, 'touchend',   e => finish(e.changedTouches[0].clientY), { passive: true });
    ctx.listen(el, 'mousedown',  e => { if (e.button === 0) begin(e.clientY); });
    ctx.listen(el, 'mouseup',    e => finish(e.clientY));

    // ── Flashlight: real torch where the hardware allows, visual
    //    toggle everywhere (still reads on camera) ──
    const flashBtn = el.querySelector('#lock-flash');
    ctx.listen(flashBtn, 'click', e => {
      e.stopPropagation();
      const on = !flashBtn.classList.contains('active');
      flashBtn.classList.toggle('active', on);
      setTorch(on);
    });
    // Camera chip: pressable, inert — reserved for the future camera module
    ctx.listen(el.querySelector('#lock-cam'), 'click', e => e.stopPropagation());

    // Auto-unlock variant
    if (cfg.lockType === 'none') sceneTimeout(() => unlockPhone(cfg), 600);

    showScreen('screen-lock');
  },

  destroy() {
    document.getElementById('phone-chrome').classList.remove('lock-active');
    wipeScreen('screen-lock');
    setTorch(false);
  }
};

/* Standard inter-module hook: open any scene by id, merged onto the
   current character. Used by lock-screen notifications; future modules
   (home screen icons, in-app links) should use the same call. */
async function loadSceneById(sceneId) {
  try {
    const res = await fetch(`scenes/${sceneId}.json`);
    if (!res.ok) throw new Error(`scenes/${sceneId}.json not found`);
    const sData = await res.json();
    const cfg = Object.assign({}, charData || {}, sData);
    currentCfg = cfg;
    launchScene(cfg);
  } catch (e) {
    surfaceError(e.message);
  }
}

function unlockPhone(cfg) {
  // Switch wallpaper to home
  setWallpaper(cfg.wallpaperHome || cfg.wallpaperLock, cfg);
  hideScreen('screen-lock');
  launchScene(cfg);
}

/* ============================================================
   SCENE LAUNCH
============================================================ */
/* Module theme precedence: Settings force > char/scene JSON attribute
   ("themeMessages" / "themeCalls") > module default (msgs light, calls dark).
   (The legacy whole-phone "theme" key is retired and ignored.) */
function resolveModuleTheme(module, cfg) {
  const forced = _settings.themeMode;
  if (forced === 'dark' || forced === 'light') return forced;
  if (module === 'messages') return cfg.themeMessages === 'dark' ? 'dark' : 'light';
  return cfg.themeCalls === 'light' ? 'light' : 'dark';
}

function launchScene(cfg) {
  const type = cfg.sceneType || 'idle';
  const chrome = document.getElementById('phone-chrome');
  chrome.classList.toggle('vfx-mode', type === 'vfx_tracker');
  chrome.classList.toggle('msg-dark',   resolveModuleTheme('messages', cfg) === 'dark');
  chrome.classList.toggle('call-light', resolveModuleTheme('phone',    cfg) === 'light');

  // Converted modules run through the registry lifecycle
  if (type === 'text') { loadModule('messages', cfg); return; }
  if (type === 'call' || type === 'dialer') { loadModule('phone', cfg); return; }
  if (type === 'imgview') { loadModule('imgviewer', cfg); return; }
  if (type === 'noservice') { loadModule('nosignal', cfg); return; }
  if (type === 'drone') { loadModule('drone', cfg); return; }
  if (type === 'tracker') { loadModule('tracker', cfg); return; }
  if (type === 'contacts') { loadModule('contacts', cfg); return; }
  if (type === 'docs') { loadModule('docs', cfg); return; }
  if (type === 'email') { loadModule('email', cfg); return; }
  if (type === 'wallet') { loadModule('wallet', cfg); return; }
  if (type === 'map') { loadModule('map', cfg); return; }

  // Legacy path — still strike whatever module was active before
  teardownActiveModule();

  if (type === 'idle') {
    showScreen('screen-home');

  } else if (type === 'vfx_tracker') {
    buildVfxTrackerScreen(cfg);
    showScreen('screen-call');

  } else {
    showScreen('screen-home');
  }
}

/* ============================================================
   DOCS — module
   Tablet-style document viewer: file list → reader. Sources per
   doc entry: "file" ending .md (mini-markdown render), .html
   (injected as-authored), .pdf (best-effort iframe — convert to
   page images for guaranteed tablet playback), or "pages": an
   array of image paths (the bulletproof PDF path). docOpen: N
   opens that doc directly.
============================================================ */
function svgDocPage() {
  return `<svg viewBox="0 0 24 24"><path d="M6 2c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6H6zm7 7V3.5L18.5 9H13z"/></svg>`;
}

/* Trusted show-authored markdown → HTML (headings, bold, italic,
   lists, rules, paragraphs). Escapes first, then formats. */
function miniMarkdown(src) {
  const lines = esc(src).split(/\r?\n/);
  let html = '', inList = false, para = [];
  const flushPara = () => {
    if (para.length) { html += `<p>${para.join(' ')}</p>`; para = []; }
  };
  const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
  const inline = s => s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
  lines.forEach(line => {
    const l = line.trimEnd();
    if (/^###\s+/.test(l))      { flushPara(); closeList(); html += `<h3>${inline(l.replace(/^###\s+/, ''))}</h3>`; }
    else if (/^##\s+/.test(l))  { flushPara(); closeList(); html += `<h2>${inline(l.replace(/^##\s+/, ''))}</h2>`; }
    else if (/^#\s+/.test(l))   { flushPara(); closeList(); html += `<h1>${inline(l.replace(/^#\s+/, ''))}</h1>`; }
    else if (/^---+$/.test(l))   { flushPara(); closeList(); html += '<hr>'; }
    else if (/^[-*]\s+/.test(l)) {
      flushPara();
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(l.replace(/^[-*]\s+/, ''))}</li>`;
    }
    else if (l === '')           { flushPara(); closeList(); }
    else                         { closeList(); para.push(inline(l)); }
  });
  flushPara(); closeList();
  return html;
}

MODULES.docs = {
  defaults: { docTitle: 'Files', docs: [], docOpen: null },

  build(cfg, ctx) {
    const el = document.getElementById('screen-docs');
    const docs = Array.isArray(cfg.docs) ? cfg.docs : [];

    function head(backTo, title) {
      return `
        <div class="doc-head">
          ${backTo ? `<button class="doc-hbtn" id="doc-back">${svgChevronLeft()}</button>` : ''}
          <span class="ttl">${esc(title)}</span>
          <button class="doc-hbtn doc-tgl">${svgDotsV()}</button>
        </div>`;
    }

    function renderList() {
      el.innerHTML = `
        ${head(false, cfg.docTitle)}
        <div class="doc-scroll">
          <div class="doc-list">
            ${docs.map((d, i) => `
            <div class="doc-row" data-i="${i}">
              ${svgDocPage()}
              <div style="min-width:0">
                <div class="t">${esc(d.title || 'Untitled')}</div>
                ${d.meta ? `<div class="m">${esc(d.meta)}</div>` : ''}
              </div>
            </div>`).join('')}
          </div>
        </div>`;
      wireToggles(el, ctx, '.doc-tgl');
      el.querySelectorAll('.doc-row').forEach(row => {
        ctx.listen(row, 'click', () => renderReader(+row.dataset.i));
      });
    }

    function renderReader(idx) {
      const doc = docs[idx];
      el.innerHTML = `
        ${head(true, doc.title || 'Document')}
        <div class="doc-scroll" id="doc-content">
          <div class="doc-page-wrap"><div class="doc-missing">Loading…</div></div>
        </div>`;
      wireToggles(el, ctx, '.doc-tgl');
      // Opened from another module (email attachments)? Back hops home
      // instead of to the file list.
      ctx.listen(el.querySelector('#doc-back'), 'click', () => {
        if (cfg._returnCfg) { currentCfg = cfg._returnCfg; launchScene(cfg._returnCfg); }
        else renderList();
      });
      const target = el.querySelector('#doc-content');

      // Swipe left/right (or mouse-drag) → next/previous document
      let swX = null, swY = null;
      const swStart = (x, y) => { swX = x; swY = y; };
      const swEnd = (x, y) => {
        if (swX == null) return;
        const dx = x - swX, dy = y - swY;
        swX = null;
        if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          const next = idx + (dx < 0 ? 1 : -1);
          if (docs[next]) renderReader(next);
        }
      };
      ctx.listen(target, 'touchstart', e => swStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      ctx.listen(target, 'touchend',   e => swEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY), { passive: true });
      ctx.listen(target, 'mousedown',  e => swStart(e.clientX, e.clientY));
      ctx.listen(target, 'mouseup',    e => swEnd(e.clientX, e.clientY));

      if (Array.isArray(doc.pages) && doc.pages.length) {
        target.innerHTML = doc.pages.map(pg =>
          `<img class="doc-pageimg" src="${esc(pg)}" alt="">`).join('');
        return;
      }
      const file = doc.file || '';
      const ext = (file.split('.').pop() || '').toLowerCase();
      if (['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext)) {
        target.innerHTML += '';
        target.innerHTML = `<img class="doc-pageimg" src="${esc(file)}" alt="">`;
        return;
      }
      if (ext === 'pdf') {
        target.innerHTML = `<iframe class="doc-pdfframe" src="${esc(file)}"></iframe>`;
        return;
      }
      fetch(file).then(r => {
        if (!r.ok) throw new Error(`${file} not found`);
        return r.text();
      }).then(txt => {
        if (ext === 'html') {
          target.innerHTML = `<div class="doc-page-wrap">${txt}</div>`;
        } else {
          target.innerHTML = `<div class="doc-page-wrap">${miniMarkdown(txt)}</div>`;
        }
      }).catch(e => {
        target.innerHTML = `<div class="doc-page-wrap"><div class="doc-missing">Document missing<br>${esc(file)}</div></div>`;
        console.warn('doc load:', e.message);
      });
    }

    const openIdx = cfg.docOpen;
    if (openIdx != null && docs[openIdx]) renderReader(openIdx);
    else renderList();

    showScreen('screen-docs');
  },

  destroy() {
    wipeScreen('screen-docs');
  }
};

MODULES.contacts = {

    const entries = Object.entries(cfg.contacts || {})
      .filter(([id]) => !id.startsWith('__'))   // temp card-only contacts stay off the list
      .map(([id, c]) => ({ id, name: c.name, avatar: c.avatar || null }));
    if (cfg.contactsFiller) {
      CONTACT_FILLER.forEach(n => entries.push({ id: null, name: n, avatar: null }));

    const avatarHTML = (c, cls) => c.avatar

    const hopCfg = extra => Object.assign({}, cfg, extra, { _returnCfg: cfg });
    const contactKeyFor = c => {

/* ============================================================
   MAP STAGE — shared pan/pinch-zoom engine (tracker + map)
   Markers counter-scale via --mz; labels are children of their
   marker so they stay glued under zoom. Scene JSON sets initial
   framing: mapImage, mapZoom, mapX/mapY (image % centered).

   RIG MODE (?rig=1): live authoring —
   - pan/zoom by hand → framing values update in the readout
   - DRAG any target/viewer marker or cyan path handle to place it
   - tap the readout to copy the full JSON block for the scene file
============================================================ */
const RIG_MODE = new URLSearchParams(location.search).has('rig');

function autoPathD(vx, vy, tx, ty) {
  const mx = (vx + tx) / 2 + (ty - vy) * 0.18;
  const my = (vy + ty) / 2 - (tx - vx) * 0.18;
  return `M ${vx} ${vy} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${tx} ${ty}`;
}

function buildMapStage(screenEl, cfg, ctx, innerHTML) {
  const maxZ = cfg.mapMaxZoom || 3;
  screenEl.innerHTML = `
    <div class="mapvp">
      <div class="mapzl">
        <img class="mapimg" src="img/${esc(cfg.mapImage)}" alt="">
        ${innerHTML}
      </div>
    </div>`;
  const vp = screenEl.querySelector('.mapvp');
  const zl = screenEl.querySelector('.mapzl');
  let z = Math.max(1, Math.min(maxZ, cfg.mapZoom || 1));
  let px = 0, py = 0;
  let rigEl = null;
  if (RIG_MODE) {
    rigEl = document.createElement('div');
    rigEl.className = 'map-rig';
    screenEl.appendChild(rigEl);
  }

  function rigReadout() {
    if (!rigEl) return;
    const r = vp.getBoundingClientRect();
    const mapX = (0.5 - px / (r.width * z)) * 100;
    const mapY = (0.5 - py / (r.height * z)) * 100;
    const ser = o => JSON.stringify(o).replace(/"([^"]+)":/g, '"$1": ').replace(/,"/g, ', "');
    const lines = [`"mapZoom": ${z.toFixed(2)}, "mapX": ${mapX.toFixed(1)}, "mapY": ${mapY.toFixed(1)}`];
    if (cfg.target) lines.push(`"target": ${ser(Object.assign({ x: cfg.target.x, y: cfg.target.y }, cfg.target))}`);
    if (cfg.viewer) lines.push(`"viewer": ${ser({ x: cfg.viewer.x, y: cfg.viewer.y })}`);
    if (Array.isArray(cfg.path)) lines.push(`"path": ${JSON.stringify(cfg.path)}`);
    rigEl.dataset.json = lines.join(',\n');
    rigEl.textContent = 'RIG — tap to copy\n' + lines.join(',\n');
  }

  function clampPan() {
    const r = vp.getBoundingClientRect();
    const mx = (z - 1) * r.width / 2, my = (z - 1) * r.height / 2;
    px = Math.max(-mx, Math.min(mx, px));
    py = Math.max(-my, Math.min(my, py));
  }
  function apply() {
    clampPan();
    zl.style.setProperty('--mz', z.toFixed(3));
    zl.style.transform = `translate(${px.toFixed(1)}px, ${py.toFixed(1)}px) scale(${z.toFixed(3)})`;
    rigReadout();
  }
  {
    const r = vp.getBoundingClientRect();
    px = -(((cfg.mapX != null ? cfg.mapX : 50) / 100) - 0.5) * r.width * z;
    py = -(((cfg.mapY != null ? cfg.mapY : 50) / 100) - 0.5) * r.height * z;
    apply();
  }

  const clampZ = v => Math.max(1, Math.min(maxZ, v));
  let drag = null, pinchD = null;
  ctx.listen(vp, 'wheel', e => {
    e.preventDefault();
    z = clampZ(z * (e.deltaY < 0 ? 1.08 : 0.93));
    apply();
  }, { passive: false });
  ctx.listen(vp, 'mousedown', e => {
    if (e.button !== 0) return;
    drag = { x: e.clientX, y: e.clientY };
    vp.classList.add('dragging');
  });
  ctx.listen(window, 'mousemove', e => {
    if (!drag) return;
    px += e.clientX - drag.x; py += e.clientY - drag.y;
    drag = { x: e.clientX, y: e.clientY };
    apply();
  });
  ctx.listen(window, 'mouseup', () => { drag = null; vp.classList.remove('dragging'); });
  ctx.listen(vp, 'touchstart', e => {
    if (e.touches.length === 1) drag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  ctx.listen(vp, 'touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault(); drag = null;
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                           e.touches[0].clientY - e.touches[1].clientY);
      if (pinchD) { z = clampZ(z * d / pinchD); apply(); }
      pinchD = d;
    } else if (e.touches.length === 1 && drag) {
      e.preventDefault();
      px += e.touches[0].clientX - drag.x; py += e.touches[0].clientY - drag.y;
      drag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      apply();
    }
  }, { passive: false });
  ctx.listen(vp, 'touchend', () => { pinchD = null; drag = null; });

  // ── Marker rigging ──
  if (RIG_MODE) {
    const toPct = (sx, sy) => {
      const r = vp.getBoundingClientRect();
      const fx = (0.5 + ((sx - (r.left + r.width / 2)) - px) / (r.width * z)) * 100;
      const fy = (0.5 + ((sy - (r.top + r.height / 2)) - py) / (r.height * z)) * 100;
      return [Math.max(0, Math.min(100, fx)), Math.max(0, Math.min(100, fy))];
    };
    const refreshPath = () => {
      const pe = zl.querySelector('.map-pathsvg path');
      if (!pe) return;
      if (Array.isArray(cfg.path) && cfg.path.length > 1) {
        pe.setAttribute('d', 'M ' + cfg.path.map(pt => `${+pt[0]} ${+pt[1]}`).join(' L '));
      } else if (cfg.path === 'auto' && cfg.viewer && cfg.target) {
        pe.setAttribute('d', autoPathD(+cfg.viewer.x, +cfg.viewer.y, +cfg.target.x, +cfg.target.y));
      }
    };
    const wireDrag = (mk, onMove) => {
      const start = e => { e.stopPropagation(); mk._rigDrag = true; };
      ctx.listen(mk, 'mousedown', start);
      ctx.listen(mk, 'touchstart', start, { passive: true });
      ctx.listen(window, 'mousemove', e => { if (mk._rigDrag) onMove(...toPct(e.clientX, e.clientY)); });
      ctx.listen(window, 'touchmove', e => {
        if (mk._rigDrag && e.touches.length === 1) onMove(...toPct(e.touches[0].clientX, e.touches[0].clientY));
      }, { passive: true });
      ctx.listen(window, 'mouseup', () => { mk._rigDrag = false; });
      ctx.listen(window, 'touchend', () => { mk._rigDrag = false; });
    };
    screenEl.querySelectorAll('.mapmk[data-rig]').forEach(mk => {
      const key = mk.dataset.rig;
      mk.style.cursor = 'move';
      wireDrag(mk, (fx, fy) => {
        cfg[key] = Object.assign({}, cfg[key], { x: +fx.toFixed(1), y: +fy.toFixed(1) });
        mk.style.left = fx + '%';
        mk.style.top = fy + '%';
        refreshPath();
        rigReadout();
      });
    });
    if (Array.isArray(cfg.path)) {
      cfg.path.forEach((pt, i) => {
        const h = document.createElement('div');
        h.className = 'mapmk map-righandle';
        h.style.left = (+pt[0]) + '%';
        h.style.top = (+pt[1]) + '%';
        zl.appendChild(h);
        wireDrag(h, (fx, fy) => {
          cfg.path[i] = [+fx.toFixed(1), +fy.toFixed(1)];
          h.style.left = fx + '%';
          h.style.top = fy + '%';
          refreshPath();
          rigReadout();
        });
      });
    }
    ctx.listen(rigEl, 'click', () => {
      const txt = (rigEl.dataset.json || '');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(txt).then(() => {
          rigEl.classList.add('copied');
          sceneTimeout(() => rigEl.classList.remove('copied'), 700);
        }).catch(() => {});
      }
    });
    rigReadout();
  }

  return { zoomBy(d) { z = clampZ(z + d); apply(); } };
}

/* Simple visual toggle wiring for inert gak buttons */
function wireToggles(root, ctx, selector) {
  root.querySelectorAll(selector).forEach(b => {
    ctx.listen(b, 'click', e => { e.stopPropagation(); b.classList.toggle('on'); });
  });
}

/* ============================================================
   TRACKER — module (tactical, BS202 sc87/90 family)
   Crosshair target + ID tag, optional viewer dot with approach
   animation, live-drifting coords while speed > 0.
============================================================ */
MODULES.tracker = {
  defaults: {
    mapImage: 'maps/temp_aerial.jpg',

    const tg = cfg.target || {};
    const tel = cfg.telemetry || {};

    const inner = `
      <div class="trk-grid"></div>
      <div class="mapmk" data-rig="target" style="left:${+tg.x || 50}%; top:${+tg.y || 40}%">
        <div class="trk-disc map-pulse">
          <svg viewBox="0 0 56 56" width="46" height="46" style="fill:none" stroke="#fff" stroke-width="3" stroke-linecap="round">
            <circle cx="28" cy="28" r="10"/>
            <circle cx="28" cy="28" r="3.5" fill="var(--trk-target)" stroke="none"/>
            <line x1="28" y1="4"  x2="28" y2="16"/><line x1="28" y1="40" x2="28" y2="52"/>
            <line x1="4"  y1="28" x2="16" y2="28"/><line x1="40" y1="28" x2="52" y2="28"/>
          </svg>
        </div>
        <div class="trk-tag">
          <div class="n">${esc(tg.label || 'TARGET')}</div>

    chrome.innerHTML = `

        <button class="trk-btn trk-tgl">${svgGear()}</button>
      </div>
      <div class="trk-rail">
        <button class="trk-btn trk-tgl"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></button>
        <button class="trk-btn trk-tgl">${svgPencil()}</button>

      </div>
      <div class="trk-zoom"><div id="trk-zin">+</div><div id="trk-zout">&minus;</div></div>
      <div class="trk-tel">
        <div class="arrow"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg></div>
        <table>
          ${tel.distance ? `<tr><td>DISTANCE:</td><td>${esc(tel.distance)}</td></tr>` : ''}
          ${tel.speed    ? `<tr><td>SPEED:</td><td>${esc(tel.speed)}</td></tr>` : ''}
          ${tel.coords   ? `<tr><td>LOCATION:</td><td id="trk-coords">${esc(tel.coords)}</td></tr>` : ''}
        </table>
      </div>`;
    while (chrome.firstChild) el.appendChild(chrome.firstChild);

    wireToggles(el, ctx, '.trk-tgl');
    ctx.listen(el.querySelector('#trk-zin'),  'click', () => stage.zoomBy(0.35));
    ctx.listen(el.querySelector('#trk-zout'), 'click', () => stage.zoomBy(-0.35));

    // Coords drift while moving (speed parses > 0)
    const speedVal = parseFloat(String(tel.speed || '').replace(/[^\d.]/g, ''));
    const coordsEl = el.querySelector('#trk-coords');
    if (coordsEl && speedVal > 0) {
      const m = String(tel.coords).match(/(-?\d+\.\d+)\D+(-?\d+\.\d+)/);
      if (m) {
        let lat = parseFloat(m[1]), lon = parseFloat(m[2]);
        sceneInterval(() => {
          lat += 0.0001; lon -= 0.0001;
          coordsEl.textContent = `${lat.toFixed(4)}\u00B0, ${lon.toFixed(4)}\u00B0`;
        }, 1000);
      }

    // Approach animation: viewer dot glides most of the way to the target
    if (cfg.viewer && cfg.approachDuration > 0 && !RIG_MODE) {
      const mk = el.querySelector('.trk-viewer');
      mk.style.transition = `left ${cfg.approachDuration}s linear, top ${cfg.approachDuration}s linear`;
      sceneTimeout(() => {
        const ex = cfg.viewer.x + (tg.x - cfg.viewer.x) * 0.85;
        const ey = cfg.viewer.y + (tg.y - cfg.viewer.y) * 0.85;
        mk.style.left = ex + '%';
        mk.style.top  = ey + '%';
      }, 600);
    }

    showScreen('screen-tracker');
  },

  destroy() {
    wipeScreen('screen-tracker');
  }
};

/* ============================================================
   MAP — module (consumer, BS202 sc84 family)
   Avatar target, blinking viewer dot, dashed path (auto curve
   viewer→target, or an explicit point list), white status card.
============================================================ */
MODULES.map = {
  defaults: {
    mapMode: 'tracker',      // "tracker" = full card; "info" = just the map/route
    mapImage: 'maps/temp_topo.jpg',
    title: 'Shared Location',
    subtitle: '',
    target: { name: 'Unknown', x: 60, y: 44 },
    viewer: null,
    path: null,
    stats: {},
    cardBattery: '',
    cardSignal: ''
  },

  build(cfg, ctx) {
    const el = document.getElementById('screen-map');
    const tg = cfg.target || {};
    const stats = cfg.stats || {};
    const initials = tg.initials ||
      String(tg.name || '?').trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const avatarInner = tg.avatar ? `<img src="img/${esc(tg.avatar)}" alt="">` : esc(initials);

    // Path: explicit points, or an auto curve viewer→target
    let pathHTML = '';
    let d = null;
    if (Array.isArray(cfg.path) && cfg.path.length > 1) {
      d = 'M ' + cfg.path.map(pt => `${+pt[0]} ${+pt[1]}`).join(' L ');
    } else if (cfg.path === 'auto' && cfg.viewer) {
      d = autoPathD(+cfg.viewer.x, +cfg.viewer.y, +tg.x, +tg.y);
    }
    if (d) {
      pathHTML = `<svg class="map-pathsvg" viewBox="0 0 100 100" preserveAspectRatio="none" style="fill:none">
        <path d="${d}" stroke="var(--map-path)" stroke-width="4" stroke-linecap="round"
              stroke-dasharray="2.6 2.6" vector-effect="non-scaling-stroke"/>
      </svg>`;
    }

    const inner = `
      ${pathHTML}
      ${cfg.viewer ? `
      <div class="mapmk" data-rig="viewer" style="left:${+cfg.viewer.x}%; top:${+cfg.viewer.y}%">
        <div class="map-start map-pulse"></div>
      </div>` : ''}
      <div class="mapmk" data-rig="target" style="left:${+tg.x || 60}%; top:${+tg.y || 44}%">
        <div class="map-avatar">${avatarInner}</div>
      </div>`;

    buildMapStage(el, cfg, ctx, inner);

    // "info" mode: viewing a route or pin, not tracking a person — no
    // avatar/CONNECTED/STOP row, no tabs; just the banner, the map, and
    // (if provided) a slim stats strip.
    const info = cfg.mapMode === 'info';
    const chrome = document.createElement('div');
    chrome.innerHTML = info ? `
      <div class="map-banner">
        <div class="t">${esc(cfg.title)}</div>
        ${cfg.subtitle ? `<div class="c">${esc(cfg.subtitle)}</div>` : ''}
      </div>
      ${(stats.speed || stats.distance || stats.elevation) ? `
      <div class="map-card">
        <div class="map-stats" style="margin-bottom:2px">
          ${stats.speed     ? `<div><div class="l">Travel Speed</div><div class="v">${esc(stats.speed)}</div></div>` : ''}
          ${stats.distance  ? `<div><div class="l">Distance</div><div class="v">${esc(stats.distance)}</div></div>` : ''}
          ${stats.elevation ? `<div><div class="l">Elevation</div><div class="v">${esc(stats.elevation)}</div></div>` : ''}
        </div>
      </div>` : ''}` : `
      <div class="map-banner">
        <div class="t">${esc(cfg.title)}</div>
        ${cfg.subtitle ? `<div class="c">${esc(cfg.subtitle)}</div>` : ''}
      </div>
      <div class="map-card">
        <div class="map-h">
          <div class="map-avatar">${avatarInner}</div>
          <div><div class="nm">${esc(tg.name || '')}</div><div class="st">CONNECTED</div></div>
          <button class="map-stop-btn map-tglx">STOP</button>
        </div>
        ${(cfg.cardBattery || cfg.cardSignal) ? `
        <div class="map-meta">
          <span>\uD83D\uDD08 Sound Off</span>
          ${cfg.cardBattery ? `<span>\u25AF ${esc(cfg.cardBattery)}</span>` : ''}
          ${cfg.cardSignal ? `<span>Signal: <b style="color:var(--map-live)">${esc(cfg.cardSignal)}</b></span>` : ''}
        </div>` : ''}
        ${(stats.speed || stats.distance || stats.elevation) ? `
        <div class="map-stats">
          ${stats.speed     ? `<div><div class="l">Travel Speed</div><div class="v">${esc(stats.speed)}</div></div>` : ''}
          ${stats.distance  ? `<div><div class="l">Distance</div><div class="v">${esc(stats.distance)}</div></div>` : ''}
          ${stats.elevation ? `<div><div class="l">Elevation</div><div class="v">${esc(stats.elevation)}</div></div>` : ''}
        </div>` : ''}
        <div class="map-tabs">
          <button class="map-tab on"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>Map</button>
          <button class="map-tab"><svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l4 4 4-4H6a7 7 0 1 1 7 7v2a9 9 0 0 0 0-18zm-1 5v5l4.25 2.52.77-1.28-3.52-2.09V8z"/></svg>History</button>
          <button class="map-tab"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>Profile</button>
          <button class="map-tab">${svgGear()}Account</button>
        </div>
      </div>`;
    while (chrome.firstChild) el.appendChild(chrome.firstChild);

    // STOP ⇄ START: stopping flips the button to positive-green START
    // and drops the CONNECTED tag; starting restores both (tracker mode)
    const stopBtn = el.querySelector('.map-stop-btn');
    if (stopBtn) ctx.listen(stopBtn, 'click', e => {
      e.stopPropagation();
      const stopped = stopBtn.classList.toggle('stopped');
      stopBtn.textContent = stopped ? 'START' : 'STOP';
      const st = el.querySelector('.map-h .st');
      if (st) st.classList.toggle('off', stopped);
    });
    el.querySelectorAll('.map-tab').forEach(tab => {
      ctx.listen(tab, 'click', e => {
        e.stopPropagation();
        el.querySelectorAll('.map-tab').forEach(x => x.classList.remove('on'));
        tab.classList.add('on');
      });
    });

    showScreen('screen-map');
  },

  destroy() {
    wipeScreen('screen-map');
  }
};

/* Attitude dial: tick arc centered off the right edge; the tick group
   rotates with the phone's physical tilt (gyro). */
function droneDialSVG() {
  const cx = 230, cy = 120, r = 175;
  let ticks = '';
  for (let a = -45; a <= 45; a += 5) {
    const rad = Math.PI * (180 + a) / 180;
    const major = a % 15 === 0;
    const len = major ? 18 : 10;
    const x1 = cx + Math.cos(rad) * r,         y1 = cy + Math.sin(rad) * r;
    const x2 = cx + Math.cos(rad) * (r - len), y2 = cy + Math.sin(rad) * (r - len);
    ticks += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke-width="${major ? 3 : 1.5}"/>`;
  }
  return `<svg viewBox="0 0 90 240">
    <g id="drone-dial-ticks" stroke="currentColor" opacity="0.85" transform="rotate(0 ${cx} ${cy})">${ticks}</g>
    <path d="M38 120l14 -7v14z" fill="var(--drone-bt)"/>
  </svg>`;
}

MODULES.drone = {
  defaults: { droneMode: 'offline', droneName: 'DRONE', droneSearchText: 'Looking for signal…' },

  build(cfg, ctx) {
    document.getElementById('phone-chrome').classList.add('drone-mode');
    const el = document.getElementById('screen-drone');

    // Offline: ghosted controller gak, no telemetry (dashes), and the
    // Bluetooth link search front and center
    el.innerHTML = `
      <div class="drone-stage">
        <div class="drone-gak">
          <div class="drone-topbar">
            <span>${esc(cfg.droneName)} &nbsp; ${svgBolt()} --%</span>
            <span class="drone-tb-right"><span>--°</span><span>-- MPH</span></span>
          </div>
          <div class="drone-stick left">${svgDroneStick()}</div>
          <div class="drone-stick right">${svgDroneStick()}</div>
        </div>
        <div class="drone-center">
          <div class="drone-bt-wrap">
            <div class="drone-bt-ring"></div>
            ${svgBluetoothSearch()}
          </div>
          <div class="drone-status">${esc(cfg.droneSearchText)}</div>
        </div>
        <div class="drone-dial">
          ${droneDialSVG()}
          <div class="drone-dial-num" id="drone-dial-num">0°</div>
        </div>
      </div>`;

    // ── Gyro-driven attitude dial. In landscape (stage rotated 90°),
    //    tilt about the phone's long axis = gamma. Flip DIAL_SIGN if
    //    the on-device direction reads inverted. ──
    const DIAL_SIGN = 1;
    const dialTicks = el.querySelector('#drone-dial-ticks');
    const dialNum   = el.querySelector('#drone-dial-num');
    ctx.listen(window, 'deviceorientation', e => {
      if (e.gamma == null) return;
      const angle = Math.max(-60, Math.min(60, DIAL_SIGN * e.gamma));
      dialTicks.setAttribute('transform', `rotate(${angle.toFixed(1)} 230 120)`);
      dialNum.textContent = `${Math.round(angle)}°`;
    });
    // iOS needs a user-gesture permission grant for orientation events
    let askedGyro = false;
    ctx.listen(el, 'pointerdown', () => {
      if (askedGyro) return;
      askedGyro = true;
      if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().catch(() => {});
      }
    });

    showScreen('screen-drone');
  },

  destroy() {
    document.getElementById('phone-chrome').classList.remove('drone-mode');
    wipeScreen('screen-drone');
  }
};

/* ============================================================
   WALLET — module (rebuilt from the two crypto references,
   radically simplified: balance, value line, fluctuation graph,
   one oversized send action. The transfer is a 6-second ease-out
   progress popup that resolves to "Transfer Complete", zeroes the
   balance and retires the send button.)
============================================================ */
/* Seeded random-walk sparkline — stable per coin name, so the graph
   is identical between takes */
function walletGraphSVG(seedStr) {
  let seed = 0;
  for (const ch of String(seedStr)) seed = (seed * 31 + ch.charCodeAt(0)) >>> 0;
  const rand = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
  const N = 42;
  let v = 50;
  const vals = [];
  for (let i = 0; i < N; i++) {
    v += (rand() - 0.48) * 24;
    if (rand() < 0.16) v += (rand() - 0.5) * 40;   // occasional spike/crash
    vals.push(v);
  }
  // Normalize the walk to span nearly the full band — guarantees real
  // peaks and valleys for every seed, not just lucky ones
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const pts = vals.map((val, i) => {
    const n = 8 + (val - lo) / (hi - lo || 1) * 84;   // → 8..92
    return `${(i / (N - 1) * 100).toFixed(2)},${(100 - n).toFixed(2)}`;
  });
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="fill:none">
    <polyline points="${pts.join(' ')}" stroke="var(--wal-accent)" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

/* ============================================================
   VFX TRACKER SCREEN/* ============================================================
   VFX TRACKER SCREEN
   Dot positions are ratios of the 1440×2960 reference image.
   Dot radius is stored as a fraction of reference width (1440px)
   so it scales correctly on any device.
============================================================ */
/* rw values are CALIBRATION data — measured from the 1440×2960 reference
   images. Never retune size here: adjust --vfx-dot-scale on the VFX
   module card instead (currently 2 = double the reference size). */
const VFX_TRACKERS = {
  first_choice:  { bg:'#000000', dot:'#FF6D0A', lx:0.091, rx:0.899, ty:0.038, by:0.962, rw:0.00903 },
  high_contrast: { bg:'#5C5C5C', dot:'#00B771', lx:0.091, rx:0.910, ty:0.050, by:0.956, rw:0.00278 },
  intense_green: { bg:'#006600', dot:'#FF630A', lx:0.094, rx:0.909, ty:0.036, by:0.962, rw:0.00347 },
  intense_grey:  { bg:'#5C5C5C', dot:'#FF6B00', lx:0.102, rx:0.912, ty:0.037, by:0.960, rw:0.00278 },
  no_reflection: { bg:'#006600', dot:'#07B271', lx:0.092, rx:0.908, ty:0.047, by:0.960, rw:0.00278 },
};

let _vfxRO = null; // ResizeObserver for the active VFX canvas

function buildVfxTrackerScreen(cfg) {
  const t = VFX_TRACKERS[cfg.vfxVariant] || VFX_TRACKERS.first_choice;
  const el = document.getElementById('screen-call');

  if (_vfxRO) { _vfxRO.disconnect(); _vfxRO = null; }

  el.innerHTML = '<canvas id="vfx-canvas"></canvas>';
  const cv = document.getElementById('vfx-canvas');
  cv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block';

  function draw() {
    const W = el.offsetWidth;
    const H = el.offsetHeight;
    if (!W || !H) return;
    cv.width  = W * (window.devicePixelRatio || 1);
    cv.height = H * (window.devicePixelRatio || 1);
    cv.style.width  = W + 'px';
    cv.style.height = H + 'px';
    const ctx = cv.getContext('2d');
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

    ctx.fillStyle = t.bg;
    ctx.fillRect(0, 0, W, H);

    // Dot radius scales with width; the module token multiplies the
    // calibrated size. Minimum 2px (pre-scale) keeps dots visible in
    // the simulator.
    const scale = parseFloat(getComputedStyle(el).getPropertyValue('--vfx-dot-scale')) || 1;
    const r = Math.max(t.rw * W, 2) * scale;
    ctx.fillStyle = t.dot;
    [[t.lx * W, t.ty * H], [t.rx * W, t.ty * H],
     [t.lx * W, t.by * H], [t.rx * W, t.by * H]].forEach(([x, y]) => {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  draw();
  _vfxRO = new ResizeObserver(draw);
  _vfxRO.observe(el);
}

/* ============================================================
   CALL SCREEN
============================================================ */
function resolveCallName(cfg) {
  const contact = cfg.contacts && cfg.sceneContact
    ? cfg.contacts[cfg.sceneContact]
    : null;
  if (!contact) return cfg.sceneContact || 'Unknown';
  // "Dad" (or any contact.name with no spaces) is already a display alias — keep it as-is
  // For regular names: use first name only, unless cfg.showFullName is true
  if (cfg.showFullName) return contact.name;
  // Single-word names (aliases like "Dad", "Rattler") stay as-is;
  // names starting with an initial or honorific ("J. Larsen",
  // "Col. Andrews") always display in full
  const parts = contact.name.trim().split(/\s+/);
  if (parts.length === 1 || parts[0].endsWith('.')) return contact.name;
  return parts[0];
}

function buildCallScreen(cfg) {
  const contact = cfg.contacts && cfg.sceneContact
    ? cfg.contacts[cfg.sceneContact]
    : null;
  const name = resolveCallName(cfg);
  const sub  = contact ? contact.number : '';
  const el   = document.getElementById('screen-call');
  const dir  = cfg.callDir || 'outgoing';
  const outcome = cfg.callOutcome || 'answered';

  if (dir === 'incoming') {
    buildIncomingCall(el, cfg, name, sub);
  } else if (outcome === 'voicemail') {
    buildConnectedCall(el, cfg, name, true, 'voicemail');
  } else if (outcome === 'noanswer') {
    buildConnectedCall(el, cfg, name, true, 'noanswer');
  } else {
    buildConnectedCall(el, cfg, name, true, 'answered');
  }
}

function buildIncomingCall(el, cfg, name, sub) {
  el.classList.remove('call-connected');
  const phoneChr = document.getElementById('phone-chrome');
  phoneChr.classList.add('incoming-mode');

  // Swap wallpaper to character's call background
  const wpEl = document.getElementById('wallpaper');
  const prevBgImage = wpEl.style.backgroundImage;
  const prevBgSize  = wpEl.style.backgroundSize;
  const prevBgPos   = wpEl.style.backgroundPosition;
  const prevBgColor = wpEl.style.backgroundColor;
  wpEl.style.backgroundImage    = `url('img/bg/${cfg.charId}.png')`;
  wpEl.style.backgroundSize     = 'cover';
  wpEl.style.backgroundPosition = 'center';
  wpEl.style.backgroundColor    = '#111';

  function restoreWallpaper() {
    phoneChr.classList.remove('incoming-mode');
    wpEl.style.backgroundImage    = prevBgImage;
    wpEl.style.backgroundSize     = prevBgSize;
    wpEl.style.backgroundPosition = prevBgPos;
    wpEl.style.backgroundColor    = prevBgColor;
  }

  el.innerHTML = `
    <div class="call-inc-wrap">
      <div class="call-inc-info">
        <div class="call-inc-label">Incoming Call</div>
        <div class="call-inc-name">${name}</div>
        <div class="call-inc-sub">Cell</div>
      </div>
      <div class="call-inc-spacer"></div>
      <div class="call-inc-msg-wrap">
        <button class="call-send-msg-btn" id="btn-send-msg">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          Send Message
        </button>
      </div>
      <div class="call-inc-actions">
        <button class="call-cir-btn" id="btn-decline">
          <div class="call-cir-icon decline">${svgPhoneEnd()}</div>
          <span class="call-cir-label">Decline</span>
        </button>
        <button class="call-cir-btn" id="btn-accept">
          <div class="call-cir-icon accept">${svgPhoneAnswer()}</div>
          <span class="call-cir-label">Accept</span>
        </button>
      </div>
    </div>`;

  el.querySelector('#btn-decline').addEventListener('click', () => {
    buildCallEndedScreen(el, cfg, name);
  });
  // Send Message rejects the call into a thread with the caller;
  // the thread's back lands on the Call Ended screen
  el.querySelector('#btn-send-msg').addEventListener('click', () => {
    restoreWallpaper();
    const known = cfg.sceneContact && cfg.contacts && cfg.contacts[cfg.sceneContact];
    const key = known ? cfg.sceneContact : '__viewtmp';
    const contacts = Object.assign({}, cfg.contacts);
    if (!known) contacts.__viewtmp = { name: name, number: '' };
    loadModule('messages', Object.assign({}, cfg, {
      sceneType: 'text', sceneContact: key, contacts,
      priorMessages: [], sceneMessage: null, sceneReply: null,
      deleteDraft: false, draftMessage: null,
      _returnCfg: Object.assign({}, cfg, { _startEnded: true })
    }));
  });
  el.querySelector('#btn-accept').addEventListener('click', () => {
    restoreWallpaper();
    buildConnectedCall(el, cfg, name, false, 'answered');
  });
}

function buildConnectedCall(el, cfg, name, showCalling, outcome) {
  el.classList.add('call-connected');

  el.innerHTML = `
    <div class="call-con-wrap">
      <div class="call-con-info">
        <div class="call-con-name">${name}</div>
        <div class="call-con-status" id="call-con-status">${showCalling || outcome !== 'answered' ? 'Calling…' : ''}</div>
      </div>
      <div class="call-card">
        ${callCardBtn('mute',    svgCallMute(),    'mute')}
        ${callCardBtn('keypad',  svgCallKeypad(),  'keypad')}
        ${callCardBtn('audio',   svgCallAudio(),   'audio')}
        ${callCardBtn('add',     svgCallAdd(),     'add call')}
        ${callCardBtn('video',   svgCallVideo(),   'video')}
        ${callCardBtn('contacts',svgCallContacts(),'contacts')}
      </div>
      <div class="call-end-wrap">
        <button class="call-end-btn" id="btn-call-end">${svgPhoneEnd()}</button>
      </div>
    </div>`;

  el.querySelector('#btn-call-end').addEventListener('click', () => {
    clearSceneTimers();
    buildCallEndedScreen(el, cfg, name);
  });

  // Card buttons: contacts and keypad are LIVE hops; the rest toggle
  el.querySelectorAll('.call-card-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.id === 'contacts') {
        // In-call contacts → the contact list (its own hops carry on
        // from there: row call starts a new call, #Pad opens the dialer)
        loadModule('contacts', Object.assign({}, cfg, {
          sceneType: 'contacts', contactsView: 'list'
        }));
        return;
      }
      if (btn.dataset.id === 'keypad') {
        // In-call keypad → the dialer; its call button returns to this
        // call scene (same contract as the double-tap shortcut)
        clearSceneTimers();
        buildDialerScreen(Object.assign({}, cfg, { _fromCallScene: true, _origCfg: cfg }));
        showScreen('screen-dialer');
        return;
      }
      btn.classList.toggle('active');
      if (btn.dataset.id === 'mute') {
        btn.querySelector('.call-card-icon').innerHTML = btn.classList.contains('active') ? svgCallMuted() : svgCallMute();
      }
    });
  });

  // Auto-activate speaker if scene is on-speaker
  if (cfg.speakerActive) {
    const audioBtn = el.querySelector('.call-card-btn[data-id="audio"]');
    if (audioBtn) audioBtn.classList.add('active');
  }

  startCallTimer(el, cfg, showCalling, outcome);
}

function buildCallEndedScreen(el, cfg, name) {
  el.classList.remove('call-connected');
  el.classList.add('call-ended');
  document.getElementById('phone-chrome').classList.remove('incoming-mode');

  el.innerHTML = `
    <div class="call-ended-wrap">
      <div class="call-ended-top">
        <div class="call-ended-header">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:var(--negative);flex-shrink:0">
            <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.32-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" transform="rotate(135 12 12)"/>
          </svg>
          <span class="call-ended-label">Call Ended</span>
        </div>
        <div class="call-ended-name">${name}</div>
      </div>
      <div style="flex:1"></div>
      <div class="call-ended-actions">
        <button class="call-cir-btn" id="btn-view-contact">
          <div class="call-cir-icon neutral" style="background:var(--call-chip)">${svgCallContacts()}</div>
          <span class="call-cir-label">View Contact</span>
        </button>
        <div class="call-ended-row">
          <button class="call-cir-btn" id="btn-call-back">
            <div class="call-cir-icon accept">${svgPhoneAnswer()}</div>
            <span class="call-cir-label">Call Back</span>
          </button>
          <button class="call-cir-btn" id="btn-msg-contact">
            <div class="call-cir-icon" style="background:var(--call-message)">${svgBubble()}</div>
            <span class="call-cir-label">Message</span>
          </button>
        </div>
      </div>
    </div>`;

  // Ended-screen hops. Unregistered callers ("Station") get a temp
  // contact entry so every hop still shows the right name. Returns
  // come back to THIS ended screen (via _startEnded), never a rerun.
  const contactPatch = () => {
    const known = cfg.sceneContact && cfg.contacts && cfg.contacts[cfg.sceneContact];
    const key = known ? cfg.sceneContact : '__viewtmp';
    const contacts = Object.assign({}, cfg.contacts);
    if (!known) contacts.__viewtmp = { name: name, number: '' };
    return { sceneContact: key, contacts };
  };
  const backHere = { _returnCfg: Object.assign({}, cfg, { _startEnded: true }) };

  el.querySelector('#btn-view-contact').addEventListener('click', () => {
    loadModule('contacts', Object.assign({}, cfg, contactPatch(), {
      sceneType: 'contacts',
      contactsView: 'card',
      cardActivity: {
        label: cfg.callDir === 'incoming' ? 'Incoming call' : 'Outgoing call',
        sub: 'Main', when: 'Just now'
      }
    }, backHere));
  });

  // Call Back: a fresh OUTGOING call to the same person (even if the
  // ended call was incoming) — live "Calling…" → timer
  el.querySelector('#btn-call-back').addEventListener('click', () => {
    loadModule('phone', Object.assign({}, cfg, contactPatch(), {
      sceneType: 'call', callDir: 'outgoing', callOutcome: 'answered',
      callDuration: null, _startEnded: false
    }));
  });

  // Message: an empty thread with the same person; back returns here
  el.querySelector('#btn-msg-contact').addEventListener('click', () => {
    loadModule('messages', Object.assign({}, cfg, contactPatch(), {
      sceneType: 'text', priorMessages: [], sceneMessage: null, sceneReply: null,
      deleteDraft: false, draftMessage: null
    }, backHere));
  });

  // Prevent any click inside the call-ended screen from bubbling to parent listeners
  el.querySelector('.call-ended-wrap').addEventListener('click', e => e.stopPropagation());

}

function startCallTimer(el, cfg, showCalling, outcome) {
  const statusEl = el.querySelector('#call-con-status');
  // All delays/intervals go through the scene timer registry: ending the
  // call or resetting the scene clears them, so a pending "answered" or
  // voicemail delay can never spawn an interval against a dead screen.

  if (outcome === 'voicemail') {
    sceneTimeout(() => {
      callSeconds = 0;
      statusEl.innerHTML = '<span class="vm-rec">Recording</span>';
      callTimer = sceneInterval(() => {
        callSeconds++;
        const m = Math.floor(callSeconds / 60);
        const s = String(callSeconds % 60).padStart(2, '0');
        statusEl.innerHTML = `<span class="vm-rec">${m}:${s}</span>`;
      }, 1000);
    }, 3500);
    return;
  }

  if (outcome === 'noanswer') {
    sceneTimeout(() => { statusEl.textContent = 'No Answer'; }, 5000);
    return;
  }

  // answered
  if (showCalling) {
    sceneTimeout(() => startTimer(), 1200);
  } else {
    startTimer();
  }

  function startTimer() {
    if (cfg.callDuration) {
      statusEl.textContent = cfg.callDuration;
    } else {
      callSeconds = 0;
      statusEl.textContent = '0:00';
      callTimer = sceneInterval(() => {
        callSeconds++;
        const m = Math.floor(callSeconds / 60);
        const s = String(callSeconds % 60).padStart(2, '0');
        statusEl.textContent = `${m}:${s}`;
      }, 1000);
    }
  }
}

/* --- Dialer confirm overlay (called from connected call screen) --- */
function openDialerFromCall(cfg) {
  const callEl = document.getElementById('screen-call');
  if (callEl.querySelector('.dialer-confirm-overlay')) return; // one at a time
  const overlay = document.createElement('div');
  overlay.className = 'dialer-confirm-overlay';

  overlay.querySelector('.cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('.open').addEventListener('click', () => {

function buildDialerScreen(cfg) {
  const el = document.getElementById('screen-dialer');

  el.innerHTML = `

      <div class="dialer-dots"><span></span><span></span><span></span></div>
    </div>

        .map(([n,s]) => `
        <button class="dial-key${n==='*'||n==='#'?' sym':''}" data-digit="${n}">
          <span class="dial-key-num">${n}</span>
          <span class="dial-key-sub">${s}</span>

      <button class="ct-tab" id="dialer-tab-contacts">${svgPerson()}Contacts</button>
    </div>`;

  const displayEl = el.querySelector('#dialer-display');
  const bkspBtn   = el.querySelector('#dialer-bksp');

  function syncBackspace() {
    bkspBtn.classList.toggle('visible', displayEl.textContent.length > 0);
  }

  el.querySelector('#dialer-grid').addEventListener('click', e => {
    const key = e.target.closest('.dial-key');
    if (!key) return;
    displayEl.textContent += key.dataset.digit;
    syncBackspace();
  });

  bkspBtn.addEventListener('click', e => {
    e.stopPropagation();
    displayEl.textContent = displayEl.textContent.slice(0, -1);
    syncBackspace();
  });

  el.querySelector('#dialer-tab-recent').addEventListener('click', e => {
    e.currentTarget.classList.toggle('on');
  });
  // Contacts tab → the contact list. Stale in-call return flags are
  // stripped so a later dialer hop from contacts dials normally.
  el.querySelector('#dialer-tab-contacts').addEventListener('click', () => {
    loadModule('contacts', Object.assign({}, cfg, {
      sceneType: 'contacts', contactsView: 'list',
      _fromCallScene: false, _origCfg: null
    }));
  });

  el.querySelector('#dialer-call-btn').addEventListener('click', () => {
    clearSceneTimers();
    if (cfg._fromCallScene && cfg._origCfg) {
      launchScene(cfg._origCfg);
    } else {
      const contact = cfg.contacts && cfg.sceneContact ? cfg.contacts[cfg.sceneContact] : null;
      const name = contact ? contact.name : (displayEl.textContent || cfg.sceneContact || 'Unknown');
      buildConnectedCall(document.getElementById('screen-call'), cfg, name, true, 'answered');
      showScreen('screen-call');
    }
  });
}

/* ── Phone — module registration ────────────────────────────
   One module for the whole phone app: dialer, incoming, active
   and ended call. */
MODULES.phone = {
  defaults: { callDir: 'outgoing', callOutcome: 'answered' },

  build(cfg, ctx) {
    // Secret shortcut: double-tap left 1/3 of a CONNECTED call → dialer.
    // Lives on the module ctx, so it can never stack across scene loads.
    const callEl = document.getElementById('screen-call');
    let dTap = 0;
    ctx.listen(callEl, 'click', e => {
      if (!callEl.classList.contains('call-connected')) return;
      if (e.target.closest('button, .call-card')) return;
      const r = callEl.getBoundingClientRect();
      if (e.clientX - r.left > r.width / 3) return;
      const now = Date.now();
      if (now - dTap < 350) { dTap = 0; openDialerFromCall(cfg); }
      else { dTap = now; }
    });

    if (cfg._startEnded) {
      // Returning from a View Contact hop: land on the ended screen,
      // don't re-run the call
      buildCallEndedScreen(callEl, cfg, resolveCallName(cfg));
      showScreen('screen-call');
    } else if (cfg.sceneType === 'dialer') {
      buildDialerScreen(cfg);
      showScreen('screen-dialer');
    } else {
      buildCallScreen(cfg);
      showScreen('screen-call');
    }
  },

  destroy() {
    document.getElementById('screen-call').classList.remove('call-connected', 'call-ended');
    document.getElementById('phone-chrome').classList.remove('incoming-mode');
  }
};
