/* ============================================================
   TEXT SCREEN
============================================================ */
function buildTextScreen(cfg, ctx) {
  const contact = cfg.contacts && cfg.sceneContact
    ? cfg.contacts[cfg.sceneContact]
    : null;

  const name = contact ? contact.name : (cfg.sceneContact || 'Unknown Number');
  document.getElementById('text-contact-name').textContent = name;

  // Back arrow → scene menu. ctx.listen is auto-removed at teardown, so
  // no clone-node tricks are needed anywhere in this module anymore.
  ctx.listen(document.querySelector('.text-hdr-back'), 'click', () => {
    if (cfg._returnCfg) { currentCfg = cfg._returnCfg; launchScene(cfg._returnCfg); }
    else resetToSetup(cfg);
  });

  const thread = document.getElementById('text-thread');
  thread.innerHTML = '';

  // Timestamps on prior messages are retired — history renders as plain
  // bubbles; only the newly sent message gets a "Today" separator.
  if (cfg.priorMessages && Array.isArray(cfg.priorMessages)) {
    cfg.priorMessages.forEach(msg => {
      addBubble(thread, msg.text, msg.from === 'me' ? 'me' : 'them', null, msg.image);
    });
    thread.scrollTop = thread.scrollHeight;
  }

  // Tapping an image opens the viewer module; its back button returns
  // here by relaunching this scene (the standard module-to-module hop)
  thread.querySelectorAll('.bubble-img').forEach(imgEl => {
    ctx.listen(imgEl, 'click', () => {
      loadModule('imgviewer', Object.assign({}, cfg, { image: imgEl.dataset.image, _returnCfg: cfg }));
    });
  });

  // Reset element STATE from any previous scene (listeners are the
  // lifecycle's job; state is ours)
  const inputEl = document.getElementById('text-input');
  inputEl.value = '';
  inputEl.style.height = '';
  inputEl.removeAttribute('disabled');
  inputEl.removeAttribute('readonly');
  const sendBtn = document.getElementById('btn-send');
  sendBtn.classList.remove('ready');

  let hasSent = false;

  function setSendReady(ready) {
    sendBtn.classList.toggle('ready', ready);
  }

  function doSend() {
    if (hasSent) return;
    const msg = cfg.sceneMessage || inputEl.value.trim() || '…';
    if (!msg) return;
    hasSent = true;
    inputEl.value = '';
    inputEl.style.height = '';
    setSendReady(false);
    addBubble(thread, msg, 'me', 'Today');
    thread.scrollTop = thread.scrollHeight;
    inputEl.setAttribute('disabled', 'true');

    if (cfg.sceneReply) {
      sceneTimeout(() => {
        addBubble(thread, cfg.sceneReply, 'them', null);
        thread.scrollTop = thread.scrollHeight;
      }, cfg.sceneReplyDelay || 2000);
    }
  }

  ctx.listen(sendBtn, 'click', doSend);
  // Desktop Enter key
  ctx.listen(inputEl, 'keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // Auto-type toggle (Settings, off by default). OFF: every scripted
  // scene is actor-driven — including drafts, where keystrokes reveal
  // the draft and backspace erases it. ON: the phone performs alone
  // (insert-shot mode) — see the block at the end of this function.
  const autoType = _settings.autoType === 'on';
  const sceneMsg = cfg.sceneMessage
    || (!autoType && cfg.deleteDraft ? cfg.draftMessage : null)
    || null;
  const charsPerKey  = sceneMsg ? Math.max(1, Math.ceil(sceneMsg.length / 40)) : 1;
  let pos = 0;
  let animTimer = null;

  function revealTo(target) {
    if (animTimer) { clearInterval(animTimer); animTimer = null; }
    let step = inputEl.value.length;
    if (step >= target) { inputEl.value = sceneMsg.slice(0, target); autoResize(inputEl); return; }
    animTimer = sceneInterval(() => {
      step++;
      inputEl.value = sceneMsg.slice(0, step);
      autoResize(inputEl);
      if (step >= target) { clearInterval(animTimer); animTimer = null; }
    }, 20);
  }

  ctx.listen(inputEl, 'input', () => {
    // Mobile soft-keyboard Enter injects \n into value instead of firing keydown
    if (inputEl.value.includes('\n')) {
      inputEl.value = inputEl.value.replace(/\n/g, '');
      autoResize(inputEl);
      doSend();
      return;
    }

    if (!sceneMsg) {
      // Free typing (no scripted message): same feel as scripted scenes —
      // the box grows with the text and the send button lights up
      autoResize(inputEl);
      setSendReady(inputEl.value.trim().length > 0);
      return;
    }

    if (inputEl.value.length <= pos) {
      // backspace — cancel animation and peel back
      if (animTimer) { clearInterval(animTimer); animTimer = null; }
      pos = inputEl.value.length;
      inputEl.value = sceneMsg.slice(0, pos);
      autoResize(inputEl);
      setSendReady(pos > 0);
      return;
    }
    pos = Math.min(pos + charsPerKey, sceneMsg.length);
    setSendReady(pos > 0);
    if (charsPerKey > 1) {
      revealTo(pos);
    } else {
      inputEl.value = sceneMsg.slice(0, pos);
      autoResize(inputEl);
    }
  });

  // Auto-type ON: the phone performs the scripted typing itself
  if (autoType && cfg.deleteDraft && cfg.draftMessage) {
    // type → hesitate → erase, input locked throughout
    inputEl.setAttribute('disabled', 'true');
    runDeleteDraft(inputEl, cfg.draftMessage, () => inputEl.removeAttribute('disabled'));
  } else if (autoType && cfg.sceneMessage) {
    // type the message, then hand control back — send stays a manual tap
    inputEl.setAttribute('disabled', 'true');
    autoTypeInto(inputEl, cfg.sceneMessage, () => {
      inputEl.removeAttribute('disabled');
      pos = cfg.sceneMessage.length;   // reveal state = fully typed
      setSendReady(true);
    });
  }
}

/* Auto-types a message with human-ish cadence, resizing the box as it
   goes. Timers run on the scene registry — struck on any transition. */
function autoTypeInto(inputEl, message, onComplete) {
  const TYPE_MS = 65;
  let i = 0;
  function resize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  }
  function typeNext() {
    if (i < message.length) {
      inputEl.value = message.slice(0, ++i);
      resize();
      sceneTimeout(typeNext, TYPE_MS + Math.random() * 45);
    } else if (onComplete) {
      onComplete();
    }
  }
  sceneTimeout(typeNext, 900);
}

/* type → hesitate → erase (the "almost sent it" beat, hands-free) */
function runDeleteDraft(inputEl, message, onComplete) {
  const PAUSE_MS = 1400;
  const DEL_MS  = 35;
  function delNext() {
    if (inputEl.value.length > 0) {
      inputEl.value = inputEl.value.slice(0, -1);
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
      sceneTimeout(delNext, DEL_MS);
    } else if (onComplete) {
      onComplete();
    }
  }
  autoTypeInto(inputEl, message, () => sceneTimeout(delNext, PAUSE_MS));
}

function addBubble(container, text, side, time, image) {
  if (time) {
    const timeEl = document.createElement('div');
    timeEl.className = 'bubble-time';
    timeEl.textContent = time;
    container.appendChild(timeEl);
  }
  if (image) {
    const ib = document.createElement('div');
    ib.className = `bubble has-img ${side}`;
    const im = document.createElement('img');
    im.src = 'img/' + image;
    im.dataset.image = image;
    im.className = 'bubble-img';
    ib.appendChild(im);
    container.appendChild(ib);
  }
  if (text) {
    const el = document.createElement('div');
    el.className = `bubble ${side}`;
    el.textContent = text;
    container.appendChild(el);
  }
}

/* ============================================================
   SCREEN MANAGEMENT
============================================================ */
function showScreen(id) {
  document.querySelectorAll('#phone-chrome .screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  if (el) el.classList.remove('hidden');
  // Status bar reads this to match the active screen's surface tone
  document.getElementById('phone-chrome').dataset.screen = id;
}

function hideScreen(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('hidden');
}

function resetToSetup(cfg) {
  clearSceneTimers();
  delete document.getElementById('phone-chrome').dataset.screen;
  document.getElementById('phone-chrome').classList.remove('msg-dark', 'call-light');
  if (_vfxRO) { _vfxRO.disconnect(); _vfxRO = null; }
  document.getElementById('phone-chrome').classList.remove('vfx-mode');
  document.querySelectorAll('#phone-chrome .screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('phone-chrome').classList.add('hidden');
  document.getElementById('screen-setup').classList.remove('hidden');
  teardownActiveModule();
  // Return to stage 2 if char+ep are saved, otherwise stage 1
  const savedChar = localStorage.getItem(LS_CHAR);
  const savedEp   = localStorage.getItem(LS_EP);
  if (savedChar && savedEp && allChars.some(c => c.id === savedChar)) {
    showStage2(savedChar, savedEp);
  } else {
    showStage1();
  }
}

function notifIcon(key) {
  // File-based icons from img/icons/. The number is each icon's measured
  // ink coverage (glyph height ÷ viewBox height, measured 2026-07-18);
  // dividing --sb-notif-h by it renders every glyph at the same VISUAL
  // height regardless of how much padding the SVG file carries.
  const fileIcons = { calendar: 0.92, msgBubble: 0.76, missedCall: 0.73, airplane: 0.86,
                      warning: 0.84, checkbox: 0.96, email: 0.52, location: 1.0 };
  if (key in fileIcons) {
    return `<img src="img/icons/${key}.svg" alt="${key}" style="height:calc(var(--sb-notif-h) / ${fileIcons[key]})">`;
  }

/* ============================================================
   SETTINGS — live adjustment of the design-token layer
   Overrides live as inline custom properties on <html> (inline
   beats the :root style-guide rule; module tokens hook in via
   the --ovr-* fallbacks on each module card). Persisted per
   device in localStorage — the deployed style guide itself is
   never modified, and "Reset to show defaults" clears it all.
============================================================ */
const SETTINGS_KEY = 'phoneOS_settings';
let _settings = {};

const SETTINGS_DEFS = [
  { key:'fontScale', group:'Global',   label:'Text size',        type:'range', min:0.8, max:1.5, step:0.05, def:1,  fmt:v=>Math.round(v*100)+'%', props:['--font-scale'], apply:(r,v)=>r.setProperty('--font-scale', v) },
  { key:'themeMode', group:'Global',   label:'Theme',            type:'segment', options:['auto','dark','light'], def:'auto', props:[], apply:()=>reapplyTheme() },
  { key:'dim',       group:'Global',   label:'Screen dim',       type:'range', min:0, max:60, step:5, def:0, fmt:v=>v+'%', props:['--screen-dim'], apply:(r,v)=>r.setProperty('--screen-dim', v/100) },
  { key:'accent',    group:'Global',   label:'Accent',           type:'color', def:'#4A90D9', props:['--accent'],   apply:(r,v)=>r.setProperty('--accent', v) },
  { key:'positive',  group:'Global',   label:'Answer green',     type:'color', def:'#4ddc60', props:['--positive'], apply:(r,v)=>r.setProperty('--positive', v) },
  { key:'negative',  group:'Global',   label:'Decline red',      type:'color', def:'#ee4b38', props:['--negative'], apply:(r,v)=>r.setProperty('--negative', v) },
  { key:'msgFont',   group:'Messages', label:'Bubble text size', type:'range', min:14, max:28, step:1, def:19, fmt:v=>v+'px', props:['--ovr-msg-font-bubble'], apply:(r,v)=>r.setProperty('--ovr-msg-font-bubble', `calc(${v}px * var(--font-scale))`) },
  { key:'msgAction', group:'Messages', label:'Bubble blue',      type:'color', def:'#007AFF', props:['--ovr-msg-action'], apply:(r,v)=>r.setProperty('--ovr-msg-action', v) },
  { key:'autoType',  group:'Messages', label:'Auto-type scripted text', type:'segment', options:['off','on'], def:'off', props:[], apply:()=>{} },
  { key:'callName',  group:'Phone',    label:'Caller name size', type:'range', min:40, max:72, step:2, def:54, fmt:v=>v+'px', props:['--ovr-call-font-name'], apply:(r,v)=>r.setProperty('--ovr-call-font-name', `calc(${v}px * var(--font-scale))`) },
  { key:'vfxDots',   group:'VFX',      label:'Tracker dot size', type:'range', min:0.5, max:4, step:0.25, def:2, fmt:v=>'\u00d7'+v, props:['--ovr-vfx-dot-scale'], apply:(r,v)=>r.setProperty('--ovr-vfx-dot-scale', v) },
];

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(_settings)); }
function settingValue(d) { return _settings[d.key] !== undefined ? _settings[d.key] : d.def; }

function setSetting(d, v) {
  _settings[d.key] = v;
  saveSettings();
  d.apply(document.documentElement.style, v);
}

function applyAllSettings() {
  const r = document.documentElement.style;
  SETTINGS_DEFS.forEach(d => {
    if (_settings[d.key] !== undefined && _settings[d.key] !== d.def) d.apply(r, _settings[d.key]);
  });
}

function resetSettings() {
  const r = document.documentElement.style;
  SETTINGS_DEFS.forEach(d => d.props.forEach(prop => r.removeProperty(prop)));
  _settings = {};
  localStorage.removeItem(SETTINGS_KEY);
  reapplyTheme();
  buildSettingsUI();
}

function buildSettingsUI(target) {
  const wrap = target || document.getElementById('settings-groups');
  wrap.innerHTML = '';
  let currentGroup = null;
  SETTINGS_DEFS.forEach(d => {
    if (d.group !== currentGroup) {
      currentGroup = d.group;
      const gl = document.createElement('div');
      gl.className = 'settings-group-label';
      gl.textContent = d.group;
      wrap.appendChild(gl);
    }
    const row = document.createElement('div');
    row.className = 'settings-row';
    const label = document.createElement('span');
    label.className = 'settings-row-label';
    label.textContent = d.label;
    row.appendChild(label);

    if (d.type === 'range') {
      const input = document.createElement('input');
      input.type = 'range';
      input.min = d.min; input.max = d.max; input.step = d.step;
      input.value = settingValue(d);
      const val = document.createElement('span');
      val.className = 'settings-row-value';
      val.textContent = d.fmt(settingValue(d));
      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        setSetting(d, v);
        val.textContent = d.fmt(v);
      });
      row.appendChild(input); row.appendChild(val);

    } else if (d.type === 'color') {
      const val = document.createElement('span');
      val.className = 'settings-row-value';
      val.textContent = settingValue(d).toUpperCase();
      const input = document.createElement('input');
      input.type = 'color';
      input.value = settingValue(d);
      input.addEventListener('input', () => {
        setSetting(d, input.value);
        val.textContent = input.value.toUpperCase();
      });
      row.appendChild(val); row.appendChild(input);

    } else if (d.type === 'segment') {
      const seg = document.createElement('div');
      seg.className = 'settings-segment';
      d.options.forEach(opt => {
        const b = document.createElement('button');
        b.textContent = opt[0].toUpperCase() + opt.slice(1);
        b.classList.toggle('active', settingValue(d) === opt);
        b.addEventListener('click', () => {
          setSetting(d, opt);
          seg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
        });
        seg.appendChild(b);
      });
      row.appendChild(seg);
    }
    wrap.appendChild(row);
  });
}

/* — Quick settings: in-scene overlay, opened by triple-tapping the
     left edge of the screen. Same controls, same live effect —
     without leaving the scene. — */
function openQuickSettings() {
  if (document.getElementById('quick-settings')) return;
  const ov = document.createElement('div');
  ov.id = 'quick-settings';
  ov.innerHTML = `
    <div class="qs-panel">
      <div class="qs-head">
        <span class="t">Quick settings</span>
        <button class="qs-done" id="qs-done">Done</button>
      </div>
      <div class="qs-body">
        <div id="qs-groups"></div>
        <button class="settings-reset-btn" id="qs-reset">Reset to show defaults</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  buildSettingsUI(ov.querySelector('#qs-groups'));
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  ov.querySelector('#qs-done').addEventListener('click', () => ov.remove());
  ov.querySelector('#qs-reset').addEventListener('click', () => {
    resetSettings();
    buildSettingsUI(ov.querySelector('#qs-groups'));
  });
}

// Triple-tap the RIGHT edge strip (48px) while a scene is active.
// Taps on real controls (buttons, zoom chips) never count.
const QS_TAP_MS = 500, QS_STRIP_PX = 48;
let _qsTaps = 0, _qsLast = 0;
document.getElementById('phone-chrome').addEventListener('click', e => {
  if (!phoneIsActive()) return;
  if (e.target.closest('button, input, .trk-zoom')) { _qsTaps = 0; return; }
  const r = document.getElementById('phone-chrome').getBoundingClientRect();
  if (r.right - e.clientX > QS_STRIP_PX) { _qsTaps = 0; return; }
  const now = Date.now();
  _qsTaps = (now - _qsLast < QS_TAP_MS) ? _qsTaps + 1 : 1;
  _qsLast = now;
  if (_qsTaps >= 3) { _qsTaps = 0; openQuickSettings(); }
});

/* — open / close — */
let _settingsReturnStage = 1;
document.getElementById('btn-settings').addEventListener('click', () => {
  _settingsReturnStage = document.getElementById('setup-stage2').classList.contains('hidden') ? 1 : 2;
  document.getElementById('setup-stage1').classList.add('hidden');
  document.getElementById('setup-stage2').classList.add('hidden');
  document.getElementById('setup-settings').classList.remove('hidden');
});
document.getElementById('btn-settings-back').addEventListener('click', () => {
  document.getElementById('setup-settings').classList.add('hidden');
  document.getElementById('setup-stage' + _settingsReturnStage).classList.remove('hidden');
});
document.getElementById('btn-settings-reset').addEventListener('click', resetSettings);

/* ============================================================
   HIDDEN CONTROLS — gestures + hotkeys (no visible UI)
============================================================ */
function restartScene() {
  if (!currentCfg) return;
  clearSceneTimers();
  launchPhone(currentCfg);
}

function goToSceneMenu() {
  if (!currentCfg) return;
  resetToSetup(currentCfg);
}

function phoneIsActive() {
  return !document.getElementById('phone-chrome').classList.contains('hidden');
}

// ── Keyboard (desktop) ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!phoneIsActive()) return;
  if (e.shiftKey && e.key === 'R') { e.preventDefault(); restartScene(); }
  if (e.key === '`')               { e.preventDefault(); goToSceneMenu(); }
});


// ── Home-screen Reset button — bound ONCE (was re-bound per scene) ──
document.getElementById('btn-reset').addEventListener('click', () => resetToSetup(currentCfg));

// ── Fullscreen — hide the REAL phone's status/nav bars ─────────
//    Installed PWA launches are already fullscreen via the manifest
//    ("display": "fullscreen"). This covers browser-tab use: request
//    immersive fullscreen on user gestures while a scene is active
//    (browsers only honor it from a gesture, and Android re-shows
//    bars after system gestures — re-asking on the next tap heals it).
function ensureFullscreen() {
  if (window.matchMedia('(display-mode: fullscreen)').matches) return; // installed app
  if (document.fullscreenElement) return;
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen({ navigationUI: 'hide' }).catch(() => {});
}
document.addEventListener('click', () => { if (phoneIsActive()) ensureFullscreen(); });
document.addEventListener('touchend', () => { if (phoneIsActive()) ensureFullscreen(); }, { passive: true });

// ── Screen wake lock — keep the display on during playback ─────
let _wakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return; // unsupported / insecure context
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {
    console.warn('Wake lock unavailable:', e.message);
  }
}
// The OS silently releases wake locks when the tab is backgrounded —
// re-acquire whenever we come back while a scene is loaded.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && currentCfg) acquireWakeLock();
});

// ── Error toast — errors must be visible during playback, when the
//    setup-status line is hidden. Tap to dismiss; auto-hides. ──────
function showErrToast(msg) {
  let t = document.getElementById('err-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'err-toast';
    t.addEventListener('click', () => { t.style.display = 'none'; });
    document.body.appendChild(t);
  }
  t.textContent = '⚠️ ' + msg;
  t.style.display = 'block';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.style.display = 'none'; }, 8000);
}

// ── Long press top-left corner → scene menu ─────────────────
const LP_MS   = 700;
const LP_PX   = 80;
let   lpTimer = null;

function inTopLeft(clientX, clientY) {
  const r = document.getElementById('phone-chrome').getBoundingClientRect();
  return (clientX - r.left) < LP_PX && (clientY - r.top) < LP_PX;
}

function lpStart(x, y) {
  if (!phoneIsActive() || !inTopLeft(x, y)) return;
  lpTimer = setTimeout(() => { lpTimer = null; goToSceneMenu(); }, LP_MS);
}
function lpCancel() { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }

/* NOTE: never name this variable "chrome" — it collides with the
   browser's window.chrome global and can kill the whole script */
const phoneChromeEl = document.getElementById('phone-chrome');
phoneChromeEl.addEventListener('touchstart',  e => lpStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
phoneChromeEl.addEventListener('touchend',    lpCancel);
phoneChromeEl.addEventListener('touchcancel', lpCancel);
phoneChromeEl.addEventListener('mousedown',   e => { if (e.button === 0) lpStart(e.clientX, e.clientY); });
phoneChromeEl.addEventListener('mouseup',     lpCancel);

// ── Double tap top strip → restart ──────────────────────────
const DT_MS        = 350;
const TOP_FRAC     = 0.22;
let   lastTapTime  = 0;

function inTopStrip(clientY) {
  const r = document.getElementById('phone-chrome').getBoundingClientRect();
  return (clientY - r.top) < r.height * TOP_FRAC;
}

phoneChromeEl.addEventListener('touchend', e => {
  if (!phoneIsActive() || !inTopStrip(e.changedTouches[0].clientY)) return;
  const now = Date.now();
  if (now - lastTapTime < DT_MS) { e.preventDefault(); restartScene(); lastTapTime = 0; }
  else lastTapTime = now;
}, { passive: false });

phoneChromeEl.addEventListener('dblclick', e => {
  if (!phoneIsActive() || !inTopStrip(e.clientY)) return;
  restartScene();
});

/* ============================================================
   SERVICE WORKER REGISTRATION
   Network-first SW: fresh files whenever online, full app
   from cache when offline. No version bumps needed.
============================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => reg.update())
      .catch(err => console.warn('SW registration failed:', err));
  });
}

/* ============================================================
   URL PARAM LOADING — ?char=jodi&scene=s207_02 skips setup
============================================================ */
async function checkUrlParams() {
  const p = new URLSearchParams(window.location.search);
  const sbh = p.get('sbh');
  if (sbh) document.documentElement.style.setProperty('--sb-icon-h', sbh + 'px');
  const arrowh = p.get('arrowh');
  if (arrowh) document.documentElement.style.setProperty('--sb-arrow-h', arrowh + 'px');
  const arrowsw = p.get('arrowsw');
  if (arrowsw) document.documentElement.style.setProperty('--sb-arrow-sw', arrowsw);
  const charId  = p.get('char');
  const sceneId = p.get('scene');
  if (!charId || !sceneId) return false;

  try {
    const [cRes, sRes] = await Promise.all([
      fetch(`chars/${charId}.json`),
      fetch(`scenes/${sceneId}.json`)
    ]);
    if (!cRes.ok || !sRes.ok) return false;

    const cData = await cRes.json();
    const sData = await sRes.json();
    charData    = cData;   // notification scene-links merge onto this
    const cfg   = Object.assign({}, cData, sData);

    // Persist so a reset-to-menu from a URL-launched scene lands on the
    // right character/episode instead of a stale or empty selection
    localStorage.setItem(LS_CHAR, charId);
    const ep = epFromSceneId(sceneId);
    if (ep) localStorage.setItem(LS_EP, ep);

    launchPhone(cfg);
    return true;
  } catch(e) {
    return false;
  }
}

/* ============================================================
   SOFT KEYBOARD — keep the phone chrome pinned
   iOS doesn't shrink the layout viewport when the keyboard opens; it
   pans the whole page up instead, sliding the status bar off screen.
   Here we measure the keyboard's overlap via visualViewport, expose it
   as --kb (screens lift their bottom edge above it), and undo the
   browser's pan so the top chrome never moves.
============================================================ */
if (window.visualViewport) {
  const vv = window.visualViewport;
  let kbRaf = null;
  function applyKb() {
    kbRaf = null;
    const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    document.documentElement.style.setProperty('--kb', kb + 'px');
    if (window.scrollY || vv.offsetTop) window.scrollTo(0, 0);
    // keep an open message thread pinned to its newest bubble
    const thread = document.querySelector('#screen-text:not(.hidden) .text-thread');
    if (thread) thread.scrollTop = thread.scrollHeight;
  }
  function queueKb() { if (!kbRaf) kbRaf = requestAnimationFrame(applyKb); }
  vv.addEventListener('resize', queueKb);
  vv.addEventListener('scroll', queueKb);
}

/* ============================================================
   BOOT
============================================================ */
/* Build stamp — shows which index.html the browser is actually running */
document.getElementById('build-stamp').textContent =
  'build ' + document.lastModified + ' · SW: ' +
  ('serviceWorker' in navigator && navigator.serviceWorker.controller ? 'active' : 'none');

/* Surface any JS or fetch error on screen so failures are never silent.
   During playback the setup-status line is hidden, so show a toast too. */
function surfaceError(msg) {
  const s = document.getElementById('setup-status');
  if (s) { s.textContent = '⚠️ ' + msg; s.classList.add('error'); }
  if (phoneIsActive()) showErrToast(msg);
}
window.addEventListener('error', e => surfaceError('JS error: ' + e.message));
window.addEventListener('unhandledrejection', e => surfaceError((e.reason && e.reason.message) || String(e.reason)));

/* ============================================================
   CONTENT ACCESS GATE (fail-safe)
   Each online boot reads _access from manifest-index.json. ONLY an
   explicit "revoked" token disables the device — anything else (ok /
   absent / unreachable / malformed JSON) runs normally, so a set
   Wi-Fi blip can never take a shoot down. A revoked device persists
   the state locally and stays down even offline, until a later online
   boot reads "ok".
============================================================ */
const LS_ACCESS = 'phoneOS_access';
const ACCESS_REVOKE = 'revoked';

function showContentUnavailable() {
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(rs => rs.forEach(r => r.unregister())).catch(() => {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(() => {});
    }
  } catch (e) {}
  document.body.innerHTML =
    '<div id="content-unavailable">' +
      '<div class="cu-title">Content unavailable</div>' +
      '<div class="cu-sub">Please contact production.</div>' +
    '</div>';
}

async function accessGate() {
  // Start from whatever this device last knew. The server can flip it
  // EITHER way — revoke a healthy device, or revive a revoked one.
  let revoked = localStorage.getItem(LS_ACCESS) === ACCESS_REVOKE;
  try {
    const res = await fetch('manifest-index.json?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const idx = await res.json();
      if (idx && idx._access === ACCESS_REVOKE) {
        localStorage.setItem(LS_ACCESS, ACCESS_REVOKE);   // persist across offline boots
        revoked = true;
      } else if (idx && idx._access === 'ok') {
        localStorage.removeItem(LS_ACCESS);               // explicit restore
        revoked = false;
      }
      // any other value / missing field → leave prior state untouched
    }
  } catch (e) { /* offline / unreachable / bad JSON → keep prior state (fail SAFE) */ }
  if (revoked) { showContentUnavailable(); return false; }
  return true;
}

/* Always run initSetup — even when a URL param launched a scene directly,
   the setup screen must be populated so reset-to-menu works. */
function boot() {
  _settings = loadSettings();
  applyAllSettings();
  buildSettingsUI();
  checkUrlParams().then(() => initSetup());
}

accessGate().then(ok => { if (ok) boot(); });
</script>
